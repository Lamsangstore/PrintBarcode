<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Print Barcode — Lamsang</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍬</text></svg>">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Manrope:wght@200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
<style>
/* LUMINOUS DASH THEME — Lamsang Print Barcode */
:root {
    --bg:#f6f7f5; --surface:#ffffff; --surface-low:#f0f1ef; --surface-high:#e7e8e6;
    --card:#ffffff; --t1:#2d2f2e; --t2:#5a5c5b; --t3:#acadac;
    --accent:#00684f; --accent-light:#89f0cb;
    --accent-cont:rgba(137,240,203,.28); --accent-cont2:rgba(137,240,203,.50);
    --border:rgba(45,47,46,.08); --border2:rgba(45,47,46,.14);
    --pink:#b31b25; --pink-cont:rgba(179,27,37,.10);
    --purple:#6f5174; --purple-cont:rgba(250,211,253,.40);
    --blue:#386075; --blue-cont:rgba(188,229,254,.45);
    --shadow-xs:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-sm:0 2px 8px rgba(0,104,79,.06),0 1px 3px rgba(0,0,0,.05);
    --shadow-md:0 4px 20px rgba(0,104,79,.10),0 2px 8px rgba(0,0,0,.06);
    --shadow-lg:0 8px 40px rgba(0,104,79,.12),0 4px 16px rgba(0,0,0,.08);
    --r-pill:9999px; --r-lg:20px; --r-md:14px; --r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Thai','Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(32px) scale(.95)}to{opacity:1;transform:none}}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes scalePop{0%{opacity:0;transform:scale(.4) rotate(-8deg)}55%{transform:scale(1.12) rotate(3deg)}75%{transform:scale(.96) rotate(-1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes scalePopBig{0%{opacity:0;transform:scale(.3) rotate(-10deg)}60%{transform:scale(1.1) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes slideIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:none}}
@keyframes shimmerBg{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes shimmerSweep{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}
@keyframes successBounce{0%{transform:scale(0) rotate(-15deg)}50%{transform:scale(1.2) rotate(5deg)}70%{transform:scale(.9) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(80px) rotate(720deg);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes floatSlow{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(2deg)}}
@keyframes scanLine{0%{transform:translateY(0)}50%{transform:translateY(60px)}100%{transform:translateY(0)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes staggerIn{from{opacity:0;transform:translateY(18px) scale(.95) rotateX(8deg)}to{opacity:1;transform:none}}
@keyframes badgePop{0%{transform:scale(0) rotate(-12deg)}60%{transform:scale(1.18) rotate(3deg)}80%{transform:scale(.94)}100%{transform:scale(1) rotate(0)}}
@keyframes wigglePrint{0%,100%{transform:rotate(0) scale(1)}20%{transform:rotate(-7deg) scale(1.12)}40%{transform:rotate(7deg) scale(1.12)}60%{transform:rotate(-3deg)}80%{transform:rotate(3deg)}}
@keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes printProgress{from{width:0}to{width:100%}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,104,79,.25)}50%{box-shadow:0 0 22px 8px rgba(0,104,79,.1)}}
@keyframes pulseGlowGreen{0%,100%{box-shadow:0 0 0 0 rgba(0,104,79,.3),0 4px 14px rgba(0,104,79,.25)}50%{box-shadow:0 0 28px 10px rgba(0,104,79,.15),0 4px 20px rgba(0,104,79,.35)}}
@keyframes floatOrb1{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(70px,-90px) scale(1.05)}66%{transform:translate(-50px,-40px) scale(.95)}}
@keyframes floatOrb2{0%,100%{transform:translate(0,0)}33%{transform:translate(-90px,60px)}66%{transform:translate(50px,90px)}}
@keyframes floatOrb3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-60px) scale(1.15)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes borderPulse{0%,100%{border-color:rgba(0,104,79,.2)}50%{border-color:rgba(0,104,79,.5)}}
@keyframes navLogoSpin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px) scale(.8)}to{opacity:1;transform:none}}
@keyframes headerGlow{0%,100%{box-shadow:0 2px 8px rgba(0,104,79,.06),0 1px 3px rgba(0,0,0,.05)}50%{box-shadow:0 4px 24px rgba(0,104,79,.14),0 2px 8px rgba(0,0,0,.08)}}
@keyframes filterPillIn{from{opacity:0;transform:scale(.6) translateY(4px)}to{opacity:1;transform:none}}
@keyframes tableRowSlideIn{from{opacity:0;transform:translateX(-20px) scale(.98)}to{opacity:1;transform:none}}
@keyframes iconWiggle{0%,100%{transform:rotate(0)}15%{transform:rotate(-12deg)}30%{transform:rotate(10deg)}45%{transform:rotate(-6deg)}60%{transform:rotate(4deg)}75%{transform:rotate(-2deg)}}
@keyframes shimmerRow{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes particleDrift{0%{opacity:0;transform:translateY(0) scale(0)}10%{opacity:.7}90%{opacity:.3}100%{opacity:0;transform:translateY(-120px) translateX(var(--dx,20px)) scale(1.2)}}
@keyframes btnPressDown{0%{transform:scale(1)}50%{transform:scale(.93)}100%{transform:scale(1)}}
@keyframes orbPulse{0%,100%{opacity:.20}50%{opacity:.28}}
@keyframes gradientBorder{0%,100%{border-color:rgba(0,104,79,.14)}50%{border-color:rgba(0,104,79,.35)}}
@keyframes typewriterCursor{0%,100%{opacity:1}50%{opacity:0}}
@keyframes rowHighlight{0%{background:rgba(0,104,79,.18)}100%{background:transparent}}

/* ===== ENTRANCE CLASSES ===== */
.anim-up{opacity:0;animation:fadeSlideUp .6s cubic-bezier(.22,1,.36,1) forwards;}
.anim-up-1{opacity:0;animation:fadeSlideUp .6s .09s cubic-bezier(.22,1,.36,1) forwards;}
.anim-up-2{opacity:0;animation:fadeSlideUp .6s .18s cubic-bezier(.22,1,.36,1) forwards;}
.anim-up-3{opacity:0;animation:fadeSlideUp .6s .27s cubic-bezier(.22,1,.36,1) forwards;}
.anim-left{opacity:0;animation:slideInLeft .5s cubic-bezier(.22,1,.36,1) forwards;}
.anim-right{opacity:0;animation:slideInRight .5s cubic-bezier(.22,1,.36,1) forwards;}
.anim-pop{opacity:0;animation:scalePop .5s cubic-bezier(.34,1.56,.64,1) forwards;}
.anim-pop-big{opacity:0;animation:scalePopBig .55s cubic-bezier(.34,1.56,.64,1) forwards;}
.animate-float{animation:floatSlow 4s ease-in-out infinite;}
.animate-wiggle-icon{animation:iconWiggle .7s ease-in-out;}

/* shimmer */
.shimmer{background:linear-gradient(90deg,#e7e8e6 25%,#f0f1ef 50%,#e7e8e6 75%);background-size:200% 100%;animation:shimmerBg 1.4s infinite;border-radius:8px;}

/* ===== GRADIENT BUTTON ===== */
.btn-gradient{
    background:linear-gradient(135deg,#00684f,#00a372,#008060,#386075);
    background-size:300% 300%;animation:gradientShift 2.5s ease infinite;
    color:#fff;border:none;border-radius:var(--r-pill);
    font-family:'Manrope','Noto Sans Thai',sans-serif;font-weight:900;font-size:17px;
    padding:16px 24px;cursor:pointer;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;position:relative;overflow:hidden;
    box-shadow:0 4px 20px rgba(0,104,79,.3),0 1px 0 rgba(255,255,255,.15) inset;
}
.btn-gradient::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 60%);pointer-events:none;}
.btn-gradient:active{transform:scale(.95);}
.btn-gradient:hover{box-shadow:0 10px 36px rgba(0,104,79,.45);transform:scale(1.025) translateY(-1px);}
.btn-gradient:disabled{animation:none;background:#c5c5c5;cursor:not-allowed;transform:none;box-shadow:none;}

/* ripple */
.ripple-container{position:relative;overflow:hidden;}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,.45);animation:ripple .7s ease-out forwards;pointer-events:none;transform-origin:center;}

.success-icon{animation:successBounce .55s cubic-bezier(.34,1.56,.64,1) forwards;}
.print-progress-bar{height:3px;border-radius:99px;background:linear-gradient(90deg,#00684f,#89f0cb,#00a372,#89f0cb,#00684f);background-size:300% 100%;animation:printProgress 2s ease-in-out forwards,shimmerBg 1.2s infinite;}
.dot-bounce{display:inline-flex;gap:4px;}
.dot-bounce span{width:6px;height:6px;background:currentColor;border-radius:50%;display:inline-block;animation:dotBounce 1.2s ease-in-out infinite;}
.dot-bounce span:nth-child(2){animation-delay:.2s;}
.dot-bounce span:nth-child(3){animation-delay:.4s;}
.qr-wrapper{position:relative;overflow:hidden;border-radius:8px;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scanLine 2s ease-in-out infinite;pointer-events:none;}

/* table row entrance */
.tr-stagger{opacity:0;animation:staggerIn .4s cubic-bezier(.22,1,.36,1) forwards;}
.badge-anim{animation:badgePop .45s cubic-bezier(.34,1.56,.64,1) forwards;}

/* ===== CARD HOVER — lift + border glow ===== */
.card-hover{transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s,border-color .35s;}
.card-hover:hover{transform:translateY(-3px) scale(1.005);box-shadow:var(--shadow-md) !important;border-color:rgba(0,104,79,.22) !important;}

/* ===== ORBS — enhanced ===== */
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.20;pointer-events:none;z-index:0;will-change:transform;animation-name:orbPulse;}
.orb-1{width:550px;height:550px;background:radial-gradient(circle,#89f0cb,#00a372);top:-170px;right:-140px;animation:floatOrb1 22s ease-in-out infinite,orbPulse 6s ease-in-out infinite;}
.orb-2{width:460px;height:460px;background:radial-gradient(circle,#fad3fd,#bce5fe);bottom:-110px;left:-110px;animation:floatOrb2 28s ease-in-out infinite,orbPulse 8s 2s ease-in-out infinite;}
.orb-3{width:320px;height:320px;background:radial-gradient(circle,#bce5fe,#89f0cb);top:40%;right:12%;animation:floatOrb3 18s ease-in-out infinite,orbPulse 5s 1s ease-in-out infinite;opacity:.15;}

/* ===== NAV ===== */
.store-nav{
    position:sticky;top:0;z-index:40;
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(24px) saturate(180%);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    border-bottom:1px solid var(--border);
    box-shadow:0 1px 0 rgba(255,255,255,.9),var(--shadow-xs);
    animation:slideDown .5s cubic-bezier(.22,1,.36,1);
}
/* nav logo hover spin */
.nav-logo{transition:transform .5s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;}
.nav-logo:hover{transform:rotate(15deg) scale(1.12);box-shadow:0 0 18px rgba(0,104,79,.3);}

/* ===== GLASS CARD ===== */
.glass-card{
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.70);
    border-radius:var(--r-lg);
    box-shadow:var(--shadow-sm);
    transition:border-color .3s;
}

/* ===== INPUT ===== */
.input-base{width:100%;padding:11px 16px;border-radius:var(--r-pill);border:1.5px solid var(--border2);background:#f0f1ef;font-family:inherit;font-size:15px;color:var(--t1);outline:none;transition:all .3s cubic-bezier(.22,1,.36,1);}
.input-base:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(0,104,79,.1),0 2px 8px rgba(0,104,79,.08);transform:scale(1.01);}
.input-base::placeholder{color:var(--t3);}

/* ===== DROPDOWN ===== */
.dropdown-trigger{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-radius:var(--r-pill);border:1.5px solid var(--border2);background:#f0f1ef;cursor:pointer;font-size:15px;color:var(--t1);transition:all .3s cubic-bezier(.22,1,.36,1);user-select:none;}
.dropdown-trigger:hover{border-color:rgba(0,104,79,.3);background:#fff;box-shadow:var(--shadow-sm);transform:scale(1.01);}
.dropdown-trigger.open{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(0,104,79,.1);}
.dropdown-panel{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--r-md);box-shadow:var(--shadow-lg);overflow:hidden;z-index:100;animation:slideIn .2s cubic-bezier(.34,1.2,.64,1);}
.dropdown-search{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface-low);}
.dropdown-search input{width:100%;border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--t1);outline:none;}
.dropdown-search input::placeholder{color:var(--t3);}
.dropdown-item{padding:11px 16px;font-size:14px;cursor:pointer;color:var(--t2);transition:all .18s;position:relative;overflow:hidden;}
.dropdown-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);transform:scaleY(0);transition:transform .2s;}
.dropdown-item:hover{background:rgba(0,104,79,.06);color:var(--t1);padding-left:20px;}
.dropdown-item:hover::before{transform:scaleY(1);}
.dropdown-item.selected{background:rgba(0,104,79,.10);color:var(--accent);font-weight:700;padding-left:20px;}
.dropdown-item.selected::before{transform:scaleY(1);}
.dropdown-list{max-height:220px;overflow-y:auto;}

/* ===== BUTTONS ===== */
.btn-primary{
    background:var(--accent);color:#c6ffe7;border:none;border-radius:var(--r-pill);
    font-family:'Manrope','Noto Sans Thai',sans-serif;font-weight:800;font-size:14px;
    padding:10px 22px;cursor:pointer;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
    display:inline-flex;align-items:center;gap:6px;
    box-shadow:0 4px 14px rgba(0,104,79,.25);
    position:relative;overflow:hidden;
}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);pointer-events:none;}
.btn-primary:hover{background:#005b45;transform:scale(1.05) translateY(-1px);box-shadow:0 8px 24px rgba(0,104,79,.4);}
.btn-primary:active{transform:scale(.94);}

.btn-ghost{background:rgba(45,47,46,.05);color:var(--t2);border:1.5px solid var(--border2);border-radius:var(--r-pill);font-family:'Manrope','Noto Sans Thai',sans-serif;font-weight:600;font-size:14px;padding:10px 18px;cursor:pointer;transition:all .25s cubic-bezier(.22,1,.36,1);display:inline-flex;align-items:center;gap:6px;}
.btn-ghost:hover{background:#fff;color:var(--t1);border-color:rgba(0,104,79,.28);box-shadow:var(--shadow-sm);transform:translateY(-1px);}
.btn-ghost:active{transform:scale(.95);}

.btn-icon{
    width:38px;height:38px;border-radius:var(--r-pill);
    border:1.5px solid var(--border2);background:rgba(45,47,46,.04);color:var(--t3);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;
}
.btn-icon:hover{background:rgba(0,104,79,.1);color:var(--accent);border-color:rgba(0,104,79,.3);transform:scale(1.15) rotate(8deg);box-shadow:0 4px 12px rgba(0,104,79,.2);}
.btn-icon:active{transform:scale(.88) rotate(0);}

.btn-danger{
    background:var(--pink-cont);color:var(--pink);
    border:1.5px solid rgba(179,27,37,.15);border-radius:var(--r-pill);
    padding:9px 12px;cursor:pointer;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
    display:inline-flex;align-items:center;justify-content:center;
    width:44px;height:44px;
}
.btn-danger:hover{background:var(--pink);color:#ffefee;transform:scale(1.12) translateY(-2px);border-color:var(--pink);box-shadow:0 6px 16px rgba(179,27,37,.3);}
.btn-danger:active{transform:scale(.9);}

.btn-print{
    background:var(--accent-cont);color:var(--accent);
    border:1.5px solid rgba(0,104,79,.20);border-radius:var(--r-pill);
    padding:9px 12px;cursor:pointer;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
    display:inline-flex;align-items:center;justify-content:center;
    width:44px;height:44px;
}
.btn-print:hover{background:var(--accent);color:#c6ffe7;transform:scale(1.15) rotate(-8deg) translateY(-2px);box-shadow:0 6px 18px rgba(0,104,79,.35);border-color:var(--accent);}
.btn-print:active{transform:scale(.88) rotate(0);}

/* ===== BADGE ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:var(--r-pill);font-size:14px;font-weight:700;letter-spacing:.01em;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;}
.badge:hover{transform:scale(1.06);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.badge-yellow{background:var(--purple-cont);color:#4f3455;border:1px solid rgba(111,81,116,.14);}
.badge-pink{background:var(--pink-cont);color:#7a0010;border:1px solid rgba(179,27,37,.14);}
.badge-blue{background:var(--blue-cont);color:#164255;border:1px solid rgba(56,96,117,.18);}
.badge-gray{background:rgba(45,47,46,.05);color:var(--t2);border:1px solid var(--border);}

/* ===== TABLE ===== */
.data-table{width:100%;border-collapse:separate;border-spacing:0 6px;table-layout:fixed;}
.data-table thead th{padding:10px 16px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:'Manrope','Noto Sans Thai',sans-serif;background:transparent;border:none;transition:color .2s;}
.data-table thead th:hover{color:var(--accent);}

/* alternating rows */
.data-table tbody tr{transition:all .25s cubic-bezier(.22,1,.36,1);}
.data-table tbody tr:nth-child(even) td{background:rgba(137,240,203,.10);}
.data-table tbody tr:nth-child(odd) td{background:var(--card);}
.data-table tbody tr:hover{transform:scale(1.005);}
.data-table tbody tr:hover td{background:rgba(0,104,79,.07) !important;box-shadow:0 4px 16px rgba(0,104,79,.08);}
.data-table tbody tr:hover td:first-child{border-left-color:var(--accent) !important;}

.data-table tbody td{padding:16px 16px;font-size:15px;vertical-align:middle;background:var(--card);border-top:1px solid rgba(45,47,46,.06);border-bottom:1px solid rgba(45,47,46,.06);transition:background .25s,box-shadow .25s;}
.data-table tbody td:first-child{border-left:1px solid rgba(45,47,46,.06);border-radius:16px 0 0 16px;transition:border-left-color .25s;}
.data-table tbody td:last-child{border-right:1px solid rgba(45,47,46,.06);border-radius:0 16px 16px 0;}

/* column A */
.column-a-container{border-left:3px solid rgba(0,104,79,.2);padding-left:12px;transition:all .35s cubic-bezier(.22,1,.36,1);}
.group:hover .column-a-container{border-left-color:var(--accent);border-left-width:4px;padding-left:14px;}
.column-a-text{display:inline-block;font-weight:800;font-size:18px;color:var(--t1);transition:transform .4s cubic-bezier(.34,1.56,.64,1),color .3s,text-shadow .3s;transform-origin:left center;line-height:1.2;font-family:'Manrope','Noto Sans Thai',sans-serif;}
.group:hover .column-a-text{transform:scale(1.22) translateX(2px);color:var(--accent);text-shadow:0 0 24px rgba(0,104,79,.25);}
.sku-text{font-size:12px !important;color:var(--t3) !important;letter-spacing:.01em;font-weight:500;transition:color .25s;}
.group:hover .sku-text{color:rgba(0,104,79,.6) !important;}
.wrap-text{white-space:normal;word-wrap:break-word;word-break:break-word;}

/* ===== STAT BOX ===== */
.stat-box{
    background:var(--accent-cont);border:1.5px solid rgba(0,104,79,.18);
    border-radius:var(--r-sm);padding:8px 14px;
    display:flex;flex-direction:column;align-items:center;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
    animation:headerGlow 4s ease-in-out infinite;
}
.stat-box:hover{box-shadow:0 0 24px rgba(0,104,79,.2);transform:scale(1.05);border-color:rgba(0,104,79,.4);}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(45,47,46,.35);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeSlideUp .25s ease forwards;}
.modal-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);border:1px solid var(--border);padding:28px;width:100%;max-width:460px;animation:scalePop .4s cubic-bezier(.34,1.56,.64,1);}
.modal-icon{width:52px;height:52px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.modal-icon:hover{transform:scale(1.1) rotate(10deg);}
.modal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px;font-family:'Manrope','Noto Sans Thai',sans-serif;}
.info-box{background:var(--surface-low);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;transition:border-color .2s;}
.info-box:hover{border-color:rgba(0,104,79,.2);}
.calc-box{background:rgba(0,104,79,.06);border:1.5px solid rgba(0,104,79,.22);border-radius:var(--r-md);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;animation:gradientBorder 2s ease-in-out infinite;}

/* ===== LOADER ===== */
.loader{border:2.5px solid rgba(0,104,79,.15);border-top:2.5px solid var(--accent);border-radius:50%;width:28px;height:28px;animation:spin .7s linear infinite;}
.loader-ring{border:2.5px solid transparent;border-top:2.5px solid rgba(0,104,79,.3);border-radius:50%;width:44px;height:44px;position:absolute;animation:spin 1.4s linear infinite reverse;}
.pulse-glow{animation:pulseGlowGreen 2.5s ease-in-out infinite;}

/* ===== SETTINGS ===== */
.settings-bg{position:fixed;inset:0;background:rgba(45,47,46,.3);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.settings-box{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);border:1px solid var(--border);padding:28px;width:100%;max-width:400px;animation:scalePop .4s cubic-bezier(.34,1.56,.64,1);}

/* ===== FILTER ACTIVE PILL ===== */
.filter-active-pill{background:var(--accent-cont2);color:var(--accent);font-size:10px;font-weight:700;padding:2px 10px;border-radius:var(--r-pill);border:1px solid rgba(0,104,79,.25);font-family:'Manrope',sans-serif;letter-spacing:.04em;animation:filterPillIn .4s cubic-bezier(.34,1.56,.64,1);}

/* ===== EMPTY STATE ===== */
.empty-state-icon{width:64px;height:64px;border-radius:var(--r-lg);background:var(--accent-cont);border:1.5px solid rgba(0,104,79,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;animation:floatSlow 3s ease-in-out infinite;}

/* ===== PAGE TITLE — shimmer sweep on hover ===== */
.page-title{
    font-family:'Manrope','Noto Sans Thai',sans-serif;font-weight:800;letter-spacing:-.01em;
    background:linear-gradient(135deg,#2d2f2e 0%,#00684f 60%,#00a372 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    background-size:200% 100%;transition:background-position .6s ease;
}
.page-title:hover{background-position:100% 0;}

/* ===== MICRO — btn-icon rotate on reload ===== */
.btn-icon.spinning svg{animation:spin .6s linear;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,104,79,.2);border-radius:10px;transition:background .2s;}
::-webkit-scrollbar-thumb:hover{background:rgba(0,104,79,.4);}

@media print{body{background:white !important;margin:0 !important;padding:0 !important;}.no-print{display:none !important;}.print-only{display:block !important;}*{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}}
.print-only{display:none;}
@media(max-width:640px){.data-table thead th,.data-table tbody td{padding:11px 10px;}.data-table tbody td{font-size:14px;}.column-a-text{font-size:16px;}.modal-box{padding:20px;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const SearchableSelect = ({ id, label, options, value, onChange, placeholder }) => {
    const [isOpen, setIsOpen] = useState(false);
    const [search, setSearch] = useState('');
    const wrapperRef = useRef(null);
    useEffect(() => {
        const handler = (e) => { if(wrapperRef.current && !wrapperRef.current.contains(e.target)){setIsOpen(false);setSearch('');} };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
    }, []);
    const filtered = useMemo(() => options.filter(o => String(o||'').toLowerCase().includes(search.toLowerCase())), [options, search]);
    return (
        <div className={`flex flex-col relative w-full ${isOpen?'z-[100]':'z-20'}`} ref={wrapperRef}>
            <label htmlFor={id} style={{fontSize:"12px",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t3)",marginBottom:"6px",display:"block",fontFamily:"'Manrope',sans-serif"}} className="no-print">{label}</label>
            <div id={id} className={`dropdown-trigger no-print ${isOpen?"open":""}`} onClick={()=>setIsOpen(!isOpen)}>
                <span style={{color:value?"var(--t1)":"var(--t3)",fontWeight:value?600:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,fontSize:"15px"}}>{value||placeholder}</span>
                <svg style={{width:"16px",height:"16px",flexShrink:0,color:"var(--t3)",transition:"transform .25s",transform:isOpen?"rotate(180deg)":"none"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
            {isOpen&&(
                <div className="dropdown-panel no-print">
                    <div className="dropdown-search"><input autoFocus type="text" placeholder="ค้นหา..." value={search} onChange={e=>setSearch(e.target.value)} onClick={e=>e.stopPropagation()} style={{width:"100%",background:"transparent",border:"none",fontFamily:"inherit",fontSize:"13px",color:"var(--t1)",outline:"none"}}/></div>
                    <div className="dropdown-list" style={{padding:"4px"}}>
                        <div className={`dropdown-item ${!value?"selected":""}`} onClick={()=>{onChange('');setIsOpen(false);setSearch('');}}>ทั้งหมด</div>
                        {filtered.length>0?filtered.map((opt,idx)=>(<div key={idx} className={`dropdown-item ${value===opt?"selected":""}`} onClick={()=>{onChange(opt);setIsOpen(false);setSearch('');}}>{opt}</div>)):<div style={{padding:"16px",textAlign:"center",color:"var(--t3)",fontSize:"12px"}}>ไม่พบผลลัพธ์</div>}
                    </div>
                </div>
            )}
        </div>
    );
};

const OutOfStockModal = ({ row, onClose, onGenerate }) => {
    const productName=row[3]||''; const variantName=row[4]||''; const sku=row[1]||'';
    const [price,setPrice]=useState(''); const [discount,setDiscount]=useState('');
    const refundAmount=useMemo(()=>{const p=parseFloat(price)||0;if(p<=0)return '';let d=0;const ds=String(discount).trim();if(ds.endsWith('%')){d=(p*parseFloat(ds.replace('%','')))/100;}else{d=parseFloat(ds)||0;}return d>0?Math.max(0,p-d).toFixed(0):p.toFixed(0);},[price,discount]);
    const handleGenerate=()=>{let dt=discount?`${discount}`:'0';if(discount&&!String(discount).includes('%'))dt+=' บาท';onGenerate({productName,variantName,sku,originalPrice:price,discountText:dt,refundAmount});};
    return (
        <div className="modal-bg" onClick={onClose}>
            <div className="modal-box" style={{maxWidth:"480px"}} onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
                    <div className="modal-icon" style={{background:"rgba(179,27,37,.08)",color:"var(--pink)"}}>📝</div>
                    <div><h3 style={{fontWeight:800,fontSize:"17px",color:"var(--t1)",fontFamily:"'Manrope',sans-serif"}}>สร้างใบแปะหน้า (คืนเงิน)</h3><p style={{fontSize:"12px",color:"var(--t3)"}}>กรอกข้อมูลเพื่อสร้างใบปะหน้าสินค้าหมด</p></div>
                </div>
                <div className="info-box" style={{marginBottom:"14px"}}><p className="modal-label">สินค้าที่หมดสต๊อก</p><p style={{fontWeight:700,fontSize:"15px",color:"var(--t1)",lineHeight:1.3}}>{productName}</p><p style={{fontSize:"13px",color:"var(--t2)",marginTop:"4px"}}>ตัวเลือก: {variantName||'-'}</p></div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                    <div><label className="modal-label">ราคาสินค้า (บาท)</label><input type="number" placeholder="เช่น 209" value={price} onChange={e=>setPrice(e.target.value)} className="input-base" style={{fontWeight:700,fontSize:"16px",textAlign:"center"}}/></div>
                    <div><label className="modal-label">ส่วนลด (บาท หรือ %)</label><input type="text" placeholder="เช่น 41 หรือ 10%" value={discount} onChange={e=>setDiscount(e.target.value)} className="input-base" style={{fontWeight:700,fontSize:"16px",textAlign:"center"}}/></div>
                </div>
                {refundAmount&&(<div className="calc-box" style={{marginBottom:"14px"}}><span style={{fontWeight:700,fontSize:"13px",color:"var(--accent)"}}>ยอดเงินที่ต้องคืน</span><span style={{fontWeight:800,fontSize:"22px",color:"var(--accent)"}}>{refundAmount} บาท</span></div>)}
                <div style={{display:"flex",gap:"8px"}}><button onClick={onClose} className="btn-ghost" style={{flex:1,justifyContent:"center"}}>ยกเลิก</button><button onClick={handleGenerate} disabled={!refundAmount} className="btn-primary" style={{flex:2,justifyContent:"center",opacity:refundAmount?1:.4,cursor:refundAmount?"pointer":"not-allowed"}}>ดูตัวอย่างใบแปะหน้า</button></div>
            </div>
        </div>
    );
};

const MarketplaceLabelTemplate = ({ data }) => (
    <div className="w-[105mm] h-[148mm] bg-white text-black box-border relative border-[3px] border-black flex flex-col mx-auto font-sans overflow-hidden" style={{fontFamily:"'Noto Sans Thai',-apple-system,sans-serif"}}>
        <div className="p-3 flex-grow flex flex-col">
            <div className="flex justify-between items-start border-b-[3px] border-black pb-2 mb-2">
                <div className="flex items-center gap-2"><div className="w-10 h-10 bg-black text-white flex items-center justify-center font-black text-xl rounded-sm tracking-tighter">LS</div><div><h1 className="font-black text-xl leading-none uppercase tracking-wide">LAMSANG</h1><p className="text-[10px] font-black mt-0.5 tracking-widest text-black">STORE OFFICIAL</p></div></div>
                <div className="flex flex-col items-end"><div className="bg-black text-white px-3 py-1 font-black text-lg rounded-sm tracking-widest">REFUND</div><p className="text-[9px] font-black mt-1 text-black">ใบแจ้งสินค้าหมด / คืนเงิน</p></div>
            </div>
            <div className="bg-white border-[3px] border-black p-2 mb-2 text-center"><h2 className="font-black text-lg tracking-wide text-black">⚠️ สินค้าหมดสต๊อก ⚠️</h2><p className="text-xs font-bold mt-0.5 text-black">โปรดติดต่อร้านค้าเพื่อรับเงินคืน ตามยอดด้านล่าง</p></div>
            <div className="flex-grow flex flex-col border-[3px] border-black mb-2 bg-white">
                <div className="bg-black text-white text-[9px] font-black py-1 px-2 uppercase tracking-widest flex justify-between"><span>รายการสินค้า (Item Details)</span><span>QTY: 0</span></div>
                <div className="flex p-2 justify-between items-center h-full">
                    <div className="flex-1 pr-2 flex flex-col justify-center"><p className="font-black text-base leading-snug text-black">{data.productName}</p><p className="text-xs text-black font-bold mt-1">ตัวเลือก: <span className="font-black">{data.variantName||'-'}</span></p><p className="text-xs text-black font-bold mt-0.5">SKU: <span className="font-black">{data.sku||'-'}</span></p></div>
                    {data.sku&&(<div className="flex flex-col items-center justify-center pl-2 border-l-[3px] border-black"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${encodeURIComponent(data.sku)}`} alt="SKU QR" className="w-12 h-12"/><span className="text-[8px] font-black mt-1 uppercase tracking-widest text-black">SKU QR</span></div>)}
                </div>
            </div>
            <div className="border-[3px] border-black p-2 flex justify-between items-center bg-white mb-1">
                <div className="text-xs font-black text-black"><p>ราคาสินค้า: {data.originalPrice||0} บาท</p><p className="mt-0.5">ส่วนลด: {data.discountText||'0 บาท'}</p></div>
                <div className="text-right"><p className="text-[9px] font-black mb-0.5 uppercase tracking-wider text-black">ยอดเงินคืนสุทธิ</p><div className="text-2xl font-black text-black">฿ {data.refundAmount}</div></div>
            </div>
        </div>
        <div className="border-t-[3px] border-black flex items-stretch mt-auto bg-white h-[36mm]">
            <div className="w-2/3 p-2 flex flex-col justify-center border-r-[3px] border-black"><p className="font-black text-[12px] mb-1.5 bg-black text-white inline-block px-2 py-0.5 self-start">ขั้นตอนการรับเงินคืน:</p><ol className="text-[10px] space-y-1.5 list-decimal list-inside font-black text-black leading-tight"><li>แอด Line ID: <span className="text-[11px] bg-white px-1.5 py-0.5 border-2 border-black">@lamsangstore</span></li><li>ถ่ายรูปใบปะหน้านี้ส่งให้แอดมิน</li><li>แจ้งเลขที่บัญชีเพื่อรับยอดโอนคืน</li></ol></div>
            <div className="w-1/3 bg-black text-white p-2 flex flex-col items-center justify-center"><div className="bg-white p-1 rounded-sm mb-1"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://line.me/R/ti/p/@lamsangstore`} alt="Line QR" className="w-16 h-16"/></div><p className="text-[8px] font-black mt-0.5 text-center tracking-widest uppercase">สแกนแอดไลน์</p></div>
        </div>
    </div>
);

const LabelPreviewModal = ({ data, onClose, onBack }) => (
    <div className="fixed inset-0 bg-slate-900/95 z-[400] flex flex-col items-center overflow-y-auto pt-6 pb-20 print:static print:bg-white print:p-0 print:block">
        <style type="text/css">{`@media print{@page{size:105mm 148mm;margin:0}body{background:white!important}.print-hide{display:none!important}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}}`}</style>
        <div className="w-full max-w-2xl px-4 flex justify-between items-center mb-6 print-hide">
            <button onClick={onBack} className="px-5 py-2.5 bg-slate-700 text-white rounded-full font-bold hover:bg-slate-600 transition-colors flex items-center gap-2"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>กลับไปแก้ไข</button>
            <div className="flex gap-3"><button onClick={onClose} className="btn-ghost">ปิด</button><button onClick={()=>window.print()} className="btn-primary"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>สั่งพิมพ์ A6</button></div>
        </div>
        <div className="bg-white shadow-[0_0_40px_rgba(0,0,0,0.5)] print:shadow-none print:m-0 border border-gray-200 print:border-none"><MarketplaceLabelTemplate data={data}/></div>
    </div>
);

const StickerQuantityModal = ({ row, onClose, onProceed }) => {
    const productName=String(row[3]||''); const sku=String(row[1]||'');
    const [targetQty,setTargetQty]=useState('');
    const copies=useMemo(()=>{const q=parseInt(targetQty,10);if(isNaN(q)||q<=0)return 0;return Math.ceil(q/3);},[targetQty]);
    return (
        <div className="modal-bg" onClick={onClose}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
                    <div className="modal-icon" style={{background:"var(--accent-cont)",color:"var(--accent)"}}>🖨️</div>
                    <div><h3 style={{fontWeight:800,fontSize:"17px",color:"var(--t1)",fontFamily:"'Manrope',sans-serif"}}>คำนวณจำนวนสติกเกอร์</h3><p style={{fontSize:"12px",color:"var(--t3)"}}>1 แผ่น (แถว) พิมพ์ได้ 3 ดวง</p></div>
                </div>
                <div className="info-box" style={{marginBottom:"14px"}}><p className="modal-label">สินค้าที่ต้องการพิมพ์</p><p style={{fontWeight:700,fontSize:"15px",color:"var(--t1)"}}>{productName}</p><p style={{fontSize:"13px",color:"var(--t2)",marginTop:"4px"}}>SKU: {sku}</p></div>
                <div style={{marginBottom:"12px"}}><label className="modal-label">ต้องการใช้งานกี่ดวง?</label><input type="number" placeholder="เช่น 100" value={targetQty} onChange={e=>setTargetQty(e.target.value)} autoFocus className="input-base" style={{fontWeight:800,fontSize:"24px",textAlign:"center"}}/></div>
                {copies>0&&(<div style={{background:"var(--accent-cont)",border:"1.5px solid rgba(0,104,79,.2)",borderRadius:"var(--r-md)",padding:"14px 16px",marginBottom:"14px",textAlign:"center"}}><p style={{fontSize:"13px",color:"var(--accent)",fontWeight:700,marginBottom:"4px"}}>{targetQty} ดวง ÷ 3 = {copies} แผ่น</p><p style={{fontSize:"13px",color:"var(--t3)"}}>รวม {copies*3} ดวง</p></div>)}
                <div style={{display:"flex",gap:"8px"}}><button onClick={onClose} className="btn-ghost" style={{flex:1,justifyContent:"center"}}>ยกเลิก</button><button onClick={()=>{if(copies>0)onProceed(copies);}} disabled={copies<=0} className="btn-primary" style={{flex:2,justifyContent:"center",opacity:copies>0?1:.4,cursor:copies>0?"pointer":"not-allowed"}}>ไปหน้าพรีวิว →</button></div>
            </div>
        </div>
    );
};

const Confetti = () => {
    const colors=['#00684f','#89f0cb','#6f5174','#fad3fd','#386075','#bce5fe'];
    return (<div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden',borderRadius:'inherit'}}>{Array.from({length:16}).map((_,i)=>(<div key={i} style={{position:'absolute',left:`${Math.random()*100}%`,top:`${Math.random()*40}%`,width:`${6+Math.random()*6}px`,height:`${6+Math.random()*6}px`,background:colors[Math.floor(Math.random()*colors.length)],borderRadius:Math.random()>.5?'50%':'2px',animation:`confetti ${.6+Math.random()*.8}s ${Math.random()*.4}s ease-out forwards`,transform:`rotate(${Math.random()*360}deg)`}}/>))}</div>);
};

const StickerPreviewModal = ({ data, onClose, printerConfig }) => {
    const {row,copies}=data; const productName=String(row[3]||''); const sku=String(row[1]||''); const variantName=String(row[4]||'');
    const [status,setStatus]=useState('idle'); const [statusMsg,setStatusMsg]=useState(''); const [showZpl,setShowZpl]=useState(false); const [showConfetti,setShowConfetti]=useState(false); const [ripples,setRipples]=useState([]);
    const {printerIP,bridgeUrl}=printerConfig;
    const generateZPL=()=>{const p=productName.substring(0,25);const v=variantName.substring(0,25);return `^XA^CI28^PW1181^LL295^MD20\n^FO4,4^A0N,28,28^FB386,1,0,C^FD${p}^FS\n^FO90,40^BQN,2,8^FDQA,${sku}^FS\n^FO4,262^A0N,26,26^FB386,1,0,C^FD${v}^FS\n^FO398,4^A0N,28,28^FB386,1,0,C^FD${p}^FS\n^FO484,40^BQN,2,8^FDQA,${sku}^FS\n^FO398,262^A0N,26,26^FB386,1,0,C^FD${v}^FS\n^FO792,4^A0N,28,28^FB386,1,0,C^FD${p}^FS\n^FO878,40^BQN,2,8^FDQA,${sku}^FS\n^FO792,262^A0N,26,26^FB386,1,0,C^FD${v}^FS\n^PQ${copies}^XZ`;};
    const addRipple=(e)=>{const b=e.currentTarget.getBoundingClientRect();const id=Date.now();setRipples(r=>[...r,{id,x:e.clientX-b.left,y:e.clientY-b.top}]);setTimeout(()=>setRipples(r=>r.filter(rp=>rp.id!==id)),700);};
    const tryWsBridge=()=>new Promise((res,rej)=>{if(!bridgeUrl){rej(new Error('no_bridge'));return;}const url=bridgeUrl.startsWith('ws')?bridgeUrl:`ws://${bridgeUrl}`;let ws,done=false;try{ws=new WebSocket(url);}catch(e){rej(e);return;}const t=setTimeout(()=>{done=true;try{ws.close()}catch{};rej(new Error('timeout'));},5000);ws.onopen=()=>ws.send(JSON.stringify({action:'print',productName,variantName,sku,copies}));ws.onmessage=e=>{if(done)return;done=true;clearTimeout(t);let r;try{r=JSON.parse(e.data);}catch{r={};}ws.close();r.ok?res(r):rej(new Error(r.error||'bridge_error'));};ws.onerror=()=>{if(!done){done=true;clearTimeout(t);try{ws.close()}catch{};rej(new Error('ws_error'));}};ws.onclose=()=>{if(!done){done=true;clearTimeout(t);rej(new Error('ws_closed'));}};});

                </div>
            </nav>
            {noticeRow&&!labelPreview&&!stickerPromptRow&&!stickerPreview&&(<OutOfStockModal row={noticeRow} onClose={()=>setNoticeRow(null)} onGenerate={(d)=>{setLabelPreview(d);setNoticeRow(null);}}/>)}
            {labelPreview&&(<LabelPreviewModal data={labelPreview} onClose={()=>setLabelPreview(null)} onBack={()=>{const r=rawData.find(r=>r[1]===labelPreview.sku);setNoticeRow(r);setLabelPreview(null);}}/>)}
            {stickerPromptRow&&!stickerPreview&&(<StickerQuantityModal row={stickerPromptRow} onClose={()=>setStickerPromptRow(null)} onProceed={(copies)=>{setStickerPreview({row:stickerPromptRow,copies});setStickerPromptRow(null);}}/>)}
            {stickerPreview&&(<StickerPreviewModal data={stickerPreview} onClose={()=>setStickerPreview(null)} printerConfig={{printerIP,bridgeUrl}}/>)}
            {isSettingsOpen&&(
                <div className="settings-bg" onClick={()=>setIsSettingsOpen(false)}>
                    <div className="settings-box" onClick={e=>e.stopPropagation()}>
                        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
                            <div className="modal-icon" style={{background:"var(--accent-cont)",color:"var(--accent)"}}>🖨️</div>
                            <div><h3 style={{fontWeight:800,fontSize:"17px",color:"var(--t1)",fontFamily:"'Manrope',sans-serif"}}>ตั้งค่าเครื่องพิมพ์</h3><p style={{fontSize:"12px",color:"var(--t3)"}}>ตั้งครั้งเดียว — จำไว้อัตโนมัติ</p></div>
                        </div>
                        <div style={{marginBottom:"14px"}}><label className="modal-label">Bridge URL <span style={{color:"var(--accent)",fontWeight:700}}>(แนะนำ — ใช้บนมือถือได้)</span></label><input type="text" className="input-base" placeholder="ws://192.168.1.100:9200" value={bridgeUrl} onChange={e=>setBridgeUrl(e.target.value)}/><p style={{fontSize:"11px",color:"var(--t3)",marginTop:"4px"}}>URL จาก terminal ที่รัน <b>node zpl-bridge.js</b></p></div>
                        <div style={{textAlign:"center",fontSize:"11px",color:"var(--t3)",margin:"8px 0"}}>— หรือ —</div>
                        <div style={{marginBottom:"16px"}}><label className="modal-label">IP เครื่องพิมพ์ <span style={{color:"var(--t3)",fontWeight:400}}>(WiFi Direct — ใช้ได้บน PC)</span></label><input type="text" inputMode="decimal" className="input-base" placeholder="เช่น 192.168.1.50" value={printerIP} onChange={e=>setPrinterIP(e.target.value)}/></div>
                        <div style={{background:"var(--accent-cont)",border:"1px solid rgba(0,104,79,.18)",borderRadius:"var(--r-sm)",padding:"10px 14px",fontSize:"11px",color:"var(--accent)",lineHeight:1.7,marginBottom:"16px"}}>🤖 <b>Auto-detect:</b> กดพิมพ์ครั้งเดียว — ระบบจะลอง Bridge → WiFi → Browser ให้อัตโนมัติ</div>
                        <div style={{display:"flex",gap:"8px"}}><button onClick={()=>setIsSettingsOpen(false)} className="btn-ghost" style={{flex:1,justifyContent:"center"}}>ยกเลิก</button><button onClick={()=>{localStorage.setItem('ls_bridge_url',bridgeUrl);localStorage.setItem('ls_printer_ip',printerIP);setIsSettingsOpen(false);}} className="btn-primary" style={{flex:1,justifyContent:"center"}}>บันทึก</button></div>
                    </div>
                </div>
            )}
            <div className={`${labelPreview||stickerPreview?"print-hide":"no-print"}`} style={{maxWidth:"1200px",margin:"0 auto",padding:"20px 20px 60px",position:"relative",zIndex:1}}>
                <header className="glass-card anim-up card-hover" style={{marginBottom:"16px",padding:"20px 24px"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"16px",flexWrap:"wrap"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"16px"}}>
                            <div style={{width:"50px",height:"50px",borderRadius:"16px",background:"var(--accent-cont2)",border:"1.5px solid rgba(0,104,79,.22)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 12px rgba(0,104,79,.12)",animation:"floatSlow 4s ease-in-out infinite"}}>
                                <svg style={{width:"24px",height:"24px",color:"var(--accent)"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                            </div>
                            <div><h1 className="page-title" style={{fontSize:"22px"}}>Print Barcode</h1><div style={{display:"flex",alignItems:"center",gap:"5px",marginTop:"4px"}}><div style={{width:"6px",height:"6px",borderRadius:"50%",background:"var(--accent)"}}/><p style={{fontSize:"13px",color:"var(--t3)",fontWeight:500}}>อัปเดต: {headers[16]||'—'}</p></div></div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                            <div className="stat-box" style={{minWidth:"80px"}}>
                                <span style={{fontSize:"11px",fontWeight:700,color:"var(--accent)",textTransform:"uppercase",letterSpacing:".08em",fontFamily:"'Manrope',sans-serif"}}>พบสินค้า</span>
                                <span key={displayCount} style={{fontSize:"26px",fontWeight:800,color:"var(--t1)",lineHeight:1,fontFamily:"'Manrope',sans-serif",animation:"countUp .3s cubic-bezier(.34,1.56,.64,1)"}}>{displayCount}</span>
                            </div>
                            <button onClick={()=>setIsSettingsOpen(true)} className="btn-icon" title="ตั้งค่า">
                                <svg style={{width:"17px",height:"17px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            </button>
                            <button onClick={handleReload} className={`btn-icon ${isReloading?"spinning":""}`} title="รีโหลด">
                                <svg style={{width:"17px",height:"17px",transition:"transform .6s",transform:isReloading?"rotate(360deg)":"none"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                            </button>
                        </div>
                    </div>
                </header>
                <section className="glass-card anim-up-1" style={{marginBottom:"14px",padding:"18px 24px",position:"relative",zIndex:30}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"}}>
                        <svg style={{width:"14px",height:"14px",color:"var(--accent)"}} fill="currentColor" viewBox="0 0 24 24"><path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
                        <span style={{fontSize:"12px",fontWeight:700,color:"var(--accent)",textTransform:"uppercase",letterSpacing:".08em",fontFamily:"'Manrope',sans-serif"}}>ตัวกรอง</span>
                        {hasActiveFilter&&<span className="filter-active-pill">Active</span>}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"12px"}}>
                        <div>
                            <label style={{fontSize:"12px",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--t3)",marginBottom:"6px",display:"block",fontFamily:"'Manrope',sans-serif"}}>ค้นหา</label>
                            <div style={{position:"relative"}}>
                                <input type="text" className="input-base" style={{paddingLeft:"40px",fontSize:"15px"}} placeholder="ชื่อ, SKU, รุ่น..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} autoComplete="off"/>
                                <svg style={{position:"absolute",left:"14px",top:"50%",transform:"translateY(-50%)",width:"16px",height:"16px",color:"var(--t3)",pointerEvents:"none"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                            </div>
                        </div>
                        <SearchableSelect id="h-sel" label={labelH} options={dropdownOptions.h} value={filterH} onChange={setFilterH} placeholder={`เลือก ${labelH}`}/>
                        <SearchableSelect id="i-sel" label={labelI} options={dropdownOptions.i} value={filterI} onChange={setFilterI} placeholder={`เลือก ${labelI}`}/>
                        <SearchableSelect id="j-sel" label={labelJ} options={dropdownOptions.j} value={filterJ} onChange={setFilterJ} placeholder={`เลือก ${labelJ}`}/>
                    </div>
                </section>
                <div className="glass-card anim-up-2" style={{overflow:"hidden",padding:"8px 0"}}>
                    <div style={{overflowX:"auto",padding:"0 8px",perspective:"1200px"}}>
                        <table className="data-table" style={{tableLayout:"fixed",width:"100%"}}>
                            <thead><tr>
                                <th style={{width:"22%",textAlign:"left",fontSize:"13px"}}>ลำดับ &amp; Barcode</th>
                                <th style={{width:"30%",textAlign:"center",fontSize:"13px"}}>{labelH}</th>
                                <th style={{width:"16%",textAlign:"center",fontSize:"13px"}}>{labelI}</th>
                                <th style={{width:"14%",textAlign:"center",fontSize:"13px"}}>{labelJ}</th>
                                <th style={{width:"9%",textAlign:"center",fontSize:"13px"}}>ใบแจ้ง</th>
                                <th style={{width:"9%",textAlign:"center",fontSize:"13px"}}>พิมพ์</th>
                            </tr></thead>
                            <tbody>
                                {filteredData.map((row,idx)=>(
                                    <tr key={idx} className="group tr-stagger" style={{animationDelay:`${Math.min(idx*28,400)}ms`}}>
                                        <td style={{verticalAlign:"middle"}}>
                                            <div className="column-a-container overflow-hidden">
                                                <span className="column-a-text wrap-text" title={row[3]}>{row[0]||'---'}</span>
                                                <span className="sku-text" style={{marginTop:"4px",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={row[1]}>{row[1]||'-'}</span>
                                            </div>
                                        </td>
                                        <td style={{textAlign:"center",verticalAlign:"middle"}}><span className="badge badge-yellow" style={{fontSize:"14px",padding:"5px 14px"}}>{row[7]}</span></td>
                                        <td style={{textAlign:"center",verticalAlign:"middle"}}><span className="badge badge-pink" style={{fontSize:"14px",padding:"5px 14px"}}>{row[8]}</span></td>
                                        <td style={{textAlign:"center",verticalAlign:"middle"}}><span className="badge badge-gray" style={{fontSize:"14px",padding:"5px 14px"}}>{row[9]}</span></td>
                                        <td style={{textAlign:"center",verticalAlign:"middle"}}>
                                            <button onClick={()=>setNoticeRow(row)} className="btn-danger" title="สร้างใบแจ้งสินค้าหมด" style={{padding:"9px 12px",borderRadius:"var(--r-pill)",width:"44px",height:"44px",justifyContent:"center"}}>
                                                <svg style={{width:"18px",height:"18px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                            </button>
                                        </td>
                                        <td style={{textAlign:"center",verticalAlign:"middle"}}>
                                            <button onClick={()=>setStickerPromptRow(row)} className="btn-print" title="พรีวิวสติกเกอร์บาร์โค้ด" style={{padding:"9px 12px",borderRadius:"var(--r-pill)",width:"44px",height:"44px",justifyContent:"center"}}>
                                                <svg style={{width:"18px",height:"18px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filteredData.length===0&&!loading&&(
                            <div style={{padding:"52px 24px",textAlign:"center"}}>
                                <div className="empty-state-icon"><svg style={{width:"28px",height:"28px",color:"var(--accent)"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div>
                                <p style={{color:"var(--t2)",fontFamily:"'Manrope',sans-serif",fontSize:"15px",fontWeight:600}}>ไม่พบสินค้าที่ค้นหา</p>
                                <p style={{color:"var(--t3)",fontSize:"13px",marginTop:"4px"}}>ลองปรับเงื่อนไขการค้นหาใหม่</p>
                            </div>
                        )}
                    </div>
                </div>
                <footer style={{marginTop:"24px",padding:"14px",textAlign:"center",fontSize:"11px",color:"var(--t3)",fontWeight:500,fontFamily:"'Manrope',sans-serif",letterSpacing:".04em"}}>
                    © 2026 Lamsang Store · Print Barcode System
                </footer>
            </div>
        </div>
    );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
