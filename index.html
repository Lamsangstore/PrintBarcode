<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Print Barcode — Lamsang</title>
    <!-- เพิ่ม Favicon รูป 🍬 เข้ากับธีมของเว็บ -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍬</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg: #f5f5f7;
        --card: #ffffff;
        --t1: #1d1d1f;
        --t2: #6e6e73;
        --t3: #86868b;
        --accent: #0071e3;
        --border: #e8e8ed;
        --pink: #ff375f;
        --green: #30d158;
        --orange: #ff9f0a;
        --purple: #bf5af2;
        --blue: #0a84ff;
        --yellow: #ffd60a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--t1);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeSlideUp { from { opacity:0; transform:translateY(30px) scale(.96); } to { opacity:1; transform:none; } }
    @keyframes slideDown { from { transform:translateY(-100%); opacity:0; } to { transform:none; opacity:1; } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes scalePop { 0%{opacity:0;transform:scale(.5)} 60%{transform:scale(1.06)} 100%{opacity:1;transform:scale(1)} }
    @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(0,113,227,.25)} 50%{box-shadow:0 0 20px 6px rgba(0,113,227,.1)} }
    @keyframes floatOrb1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(60px,-80px)} 66%{transform:translate(-40px,-40px)} }
    @keyframes floatOrb2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-80px,50px)} 66%{transform:translate(40px,80px)} }
    @keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }
    @keyframes slideIn { from{opacity:0;transform:scale(.97) translateY(12px)} to{opacity:1;transform:none} }
    @keyframes shimmerText {
        0%{background-position:-200% center}
        100%{background-position:200% center}
    }

    .anim-up { opacity:0; animation:fadeSlideUp .6s cubic-bezier(.22,1,.36,1) forwards; }
    .anim-pop { opacity:0; animation:scalePop .5s cubic-bezier(.34,1.56,.64,1) forwards; }
    .animate-item { animation:slideIn .4s cubic-bezier(.22,1,.36,1) forwards; }

    /* Floating orbs background */
    .orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.15; pointer-events:none; z-index:0; will-change:transform; }
    .orb-1 { width:380px; height:380px; background:var(--accent); top:-80px; right:-80px; animation:floatOrb1 22s ease-in-out infinite; }
    .orb-2 { width:320px; height:320px; background:var(--purple); bottom:-60px; left:-60px; animation:floatOrb2 28s ease-in-out infinite; }

    /* ===== NAV ===== */
    .store-nav {
        position: sticky; top: 0; z-index: 40;
        background: rgba(245,245,247,.8);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: .5px solid var(--border);
        animation: slideDown .5s cubic-bezier(.22,1,.36,1);
    }

    /* ===== CARDS & CONTAINERS ===== */
    .glass-card {
        background: rgba(255,255,255,.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: .5px solid rgba(255,255,255,.8);
        border-radius: 20px;
        box-shadow: 0 2px 20px rgba(0,0,0,.06);
    }

    /* ===== INPUTS ===== */
    .input-base {
        width: 100%;
        padding: 10px 16px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        background: #fafafa;
        font-family: inherit;
        font-size: 14px;
        color: var(--t1);
        outline: none;
        transition: all .25s;
    }
    .input-base:focus {
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(0,113,227,.1);
    }

    /* ===== DROPDOWN (SearchableSelect) ===== */
    .dropdown-trigger {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        background: #fafafa;
        cursor: pointer;
        font-size: 14px;
        color: var(--t1);
        transition: all .25s;
        user-select: none;
    }
    .dropdown-trigger:hover { border-color: #c7c7cc; background: #fff; }
    .dropdown-trigger.open { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(0,113,227,.1); }
    .dropdown-panel {
        position: absolute; top: calc(100% + 6px); left: 0; right: 0;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 8px 32px rgba(0,0,0,.12);
        overflow: hidden;
        z-index: 100;
        animation: slideIn .25s ease;
    }
    .dropdown-search {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: #f5f5f7;
    }
    .dropdown-search input {
        width: 100%; border: none; background: transparent;
        font-family: inherit; font-size: 13px; color: var(--t1); outline: none;
    }
    .dropdown-item {
        padding: 10px 14px; font-size: 13px; cursor: pointer; color: var(--t1);
        transition: background .15s;
    }
    .dropdown-item:hover { background: #f5f5f7; }
    .dropdown-item.selected { background: rgba(0,113,227,.08); color: var(--accent); font-weight: 700; }
    .dropdown-list { max-height: 220px; overflow-y: auto; }

    /* ===== BUTTONS ===== */
    .btn-primary {
        background: var(--accent); color: #fff;
        border: none; border-radius: 12px;
        font-family: inherit; font-weight: 700; font-size: 14px;
        padding: 10px 20px; cursor: pointer;
        transition: all .3s cubic-bezier(.34,1.56,.64,1);
        display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { background: #0077ed; transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,113,227,.3); }
    .btn-primary:active { transform: scale(.95); }

    .btn-ghost {
        background: rgba(0,0,0,.05); color: var(--t2);
        border: none; border-radius: 12px;
        font-family: inherit; font-weight: 600; font-size: 14px;
        padding: 10px 16px; cursor: pointer;
        transition: all .25s;
        display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { background: rgba(0,0,0,.09); color: var(--t1); }
    .btn-ghost:active { transform: scale(.95); }

    .btn-icon {
        width: 36px; height: 36px; border-radius: 10px;
        border: none; background: rgba(0,0,0,.05); color: var(--t2);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all .25s; flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(0,0,0,.1); color: var(--t1); transform: scale(1.08); }
    .btn-icon:active { transform: scale(.92); }

    .btn-danger {
        background: rgba(255,55,95,.08); color: var(--pink);
        border: none; border-radius: 10px; padding: 7px 8px;
        cursor: pointer; transition: all .25s;
        display: inline-flex; align-items: center;
    }
    .btn-danger:hover { background: var(--pink); color: #fff; transform: scale(1.08); }
    .btn-danger:active { transform: scale(.92); }

    .btn-print {
        background: rgba(0,113,227,.1); color: var(--accent);
        border: none; border-radius: 10px; padding: 7px 8px;
        cursor: pointer; transition: all .25s;
        display: inline-flex; align-items: center;
    }
    .btn-print:hover { background: var(--accent); color: #fff; transform: scale(1.08); }
    .btn-print:active { transform: scale(.92); }

    /* ===== BADGE ===== */
    .badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700;
    }
    .badge-yellow { background: rgba(255,214,10,.15); color: #b07d00; }
    .badge-pink { background: rgba(255,55,95,.1); color: var(--pink); }
    .badge-blue { background: rgba(0,113,227,.1); color: var(--accent); }
    .badge-gray { background: rgba(0,0,0,.06); color: var(--t2); }

    /* ===== TABLE ===== */
    .data-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .data-table thead th {
        padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: .06em; color: var(--t3);
        background: #f5f5f7; border-bottom: 1px solid var(--border);
    }
    .data-table thead th:first-child { border-radius: 14px 0 0 0; }
    .data-table thead th:last-child { border-radius: 0 14px 0 0; }
    .data-table tbody tr {
        border-bottom: .5px solid var(--border);
        transition: background .15s;
    }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody tr:hover { background: rgba(0,113,227,.03); }
    .data-table tbody td { padding: 11px 14px; font-size: 14px; vertical-align: middle; }

    /* column A hover zoom */
    .column-a-container { border-left: 4px solid var(--accent); padding-left: 10px; transition: all .3s; }
    .column-a-text {
        display: inline-block; font-weight: 800; font-size: 15px; color: var(--t1);
        transition: transform .4s cubic-bezier(.34,1.56,.64,1), color .3s;
        transform-origin: left center; line-height: 1.2;
    }
    .group:hover .column-a-text { transform: scale(1.5); color: var(--accent); }
    .wrap-text { white-space: normal; word-wrap: break-word; word-break: break-word; }

    /* ===== MODAL ===== */
    .modal-bg {
        position: fixed; inset: 0; background: rgba(0,0,0,.4);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        z-index: 300; display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-box {
        background: #fff; border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,.18);
        padding: 28px; width: 100%; max-width: 460px;
        animation: slideIn .4s cubic-bezier(.34,1.56,.64,1);
        border: .5px solid var(--border);
    }
    .modal-icon {
        width: 52px; height: 52px; border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; flex-shrink: 0;
    }
    .modal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--t3); margin-bottom: 4px; }
    .info-box { background: #f5f5f7; border-radius: 14px; padding: 14px 16px; }
    .calc-box { background: rgba(48,209,88,.08); border: 1.5px solid rgba(48,209,88,.3); border-radius: 14px; padding: 14px 16px; display:flex; justify-content:space-between; align-items:center; }

    /* ===== LOADER ===== */
    .loader { border: 3px solid #e8e8ed; border-top: 3px solid var(--accent); border-radius: 50%; width: 28px; height: 28px; animation: spin .8s linear infinite; }
    .pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }

    /* ===== SETTINGS ===== */
    .settings-bg {
        position: fixed; inset: 0; background: rgba(0,0,0,.3);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .settings-box {
        background: #fff; border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,.15);
        padding: 28px; width: 100%; max-width: 400px;
        animation: slideIn .4s cubic-bezier(.34,1.56,.64,1);
        border: .5px solid var(--border);
    }

    /* ===== PRINT ===== */
    @media print {
        body { background: white !important; margin: 0 !important; padding: 0 !important; }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    }
    .print-only { display: none; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 10px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
        .data-table thead th, .data-table tbody td { padding: 9px 10px; }
        .data-table tbody td { font-size: 12px; }
        .column-a-text { font-size: 13px; }
        .modal-box { padding: 20px; }
    }
</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        /* =================== SearchableSelect =================== */
        const SearchableSelect = ({ id, label, options, value, onChange, placeholder, accentColor = "pink" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handler = (e) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(e.target)) { setIsOpen(false); setSearch(''); }
                };
                document.addEventListener("mousedown", handler);
                return () => document.removeEventListener("mousedown", handler);
            }, []);

            const filtered = useMemo(() => options.filter(o => String(o||'').toLowerCase().includes(search.toLowerCase())), [options, search]);
            

            return (
                <div className={`flex flex-col relative w-full ${isOpen ? 'z-[100]' : 'z-20'}`} ref={wrapperRef}>
                    <label htmlFor={id} style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--t3)",marginBottom:"4px",display:"block"}} className="no-print">{label}</label>
                    <div id={id} className={`dropdown-trigger no-print ${isOpen ? "open" : ""}`} onClick={() => setIsOpen(!isOpen)}>
                        <span style={{color: value ? "var(--t1)" : "var(--t3)", fontWeight: value ? 600 : 400, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1}}>{value || placeholder}</span>
                        <svg style={{width:"16px",height:"16px",flexShrink:0,color:"var(--t3)",transition:"transform .25s",transform:isOpen?"rotate(180deg)":"none"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                    </div>
                    {isOpen && (
                        <div className="dropdown-panel no-print">
                            <div className="dropdown-search">
                                <input autoFocus type="text" placeholder="ค้นหา..." value={search} onChange={e => setSearch(e.target.value)} onClick={e => e.stopPropagation()} style={{width:"100%",background:"transparent",border:"none",fontFamily:"inherit",fontSize:"13px",color:"var(--t1)",outline:"none"}} />
                            </div>
                            <div className="dropdown-list" style={{padding:"4px"}}>
                                <div className={`dropdown-item ${!value ? "selected" : ""}`} onClick={() => { onChange(''); setIsOpen(false); setSearch(''); }}>ทั้งหมด</div>
                                {filtered.length > 0 ? filtered.map((opt, idx) => (
                                    <div key={idx} className={`dropdown-item ${value === opt ? "selected" : ""}`} onClick={() => { onChange(opt); setIsOpen(false); setSearch(''); }}>{opt}</div>
                                )) : <div style={{padding:"16px",textAlign:"center",color:"var(--t3)",fontSize:"12px"}}>ไม่พบผลลัพธ์</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* =================== OutOfStockModal (ฟอร์มกรอกราคาก่อนสร้างใบแปะหน้า) =================== */
        const OutOfStockModal = ({ row, onClose, onGenerate }) => {
            const productName = row[3] || ''; 
            const variantName = row[4] || ''; 
            const sku = row[1] || '';
            const [price, setPrice] = useState('');
            const [discount, setDiscount] = useState('');

            const refundAmount = useMemo(() => {
                const p = parseFloat(price) || 0;
                if (p <= 0) return '';
                
                let d = 0;
                const discStr = String(discount).trim();
                if (discStr.endsWith('%')) {
                    const percent = parseFloat(discStr.replace('%', '')) || 0;
                    d = (p * percent) / 100;
                } else {
                    d = parseFloat(discStr) || 0;
                }
                
                if (d > 0) return Math.max(0, p - d).toFixed(0);
                return p.toFixed(0);
            }, [price, discount]);

            const handleGenerate = () => {
                let discText = discount ? `${discount}` : '0';
                if(discount && !String(discount).includes('%')) discText += ' บาท';

                onGenerate({
                    productName, variantName, sku,
                    originalPrice: price, discountText: discText, refundAmount
                });
            };

            return (
                <div className="modal-bg" onClick={onClose}>
                    <div className="modal-box" style={{maxWidth:"480px"}} onClick={e => e.stopPropagation()}>
                        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
                            <div className="modal-icon" style={{background:"rgba(255,55,95,.08)",color:"var(--pink)"}}>📝</div>
                            <div>
                                <h3 style={{fontWeight:800,fontSize:"17px",color:"var(--t1)"}}>สร้างใบแปะหน้า (คืนเงิน)</h3>
                                <p style={{fontSize:"12px",color:"var(--t3)"}}>กรอกข้อมูลเพื่อสร้างใบปะหน้าสินค้าหมด</p>
                            </div>
                        </div>

                        <div className="info-box" style={{marginBottom:"14px"}}><p className="modal-label">สินค้าที่หมดสต๊อก</p><p style={{fontWeight:700,fontSize:"15px",color:"var(--t1)",lineHeight:1.3}}>{productName}</p><p style={{fontSize:"13px",color:"var(--t2)",marginTop:"4px"}}>ตัวเลือก: {variantName || '-'}</p></div>

                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                            <div>
                                <label className="modal-label">ราคาสินค้า (บาท)</label><input type="number" placeholder="เช่น 209" value={price} onChange={e => setPrice(e.target.value)} className="input-base" style={{fontWeight:700,fontSize:"16px",textAlign:"center"}} />
                            </div>
                            <div>
                                <label className="modal-label">ส่วนลด (บาท หรือ %)</label><input type="text" placeholder="เช่น 41 หรือ 10%" value={discount} onChange={e => setDiscount(e.target.value)} className="input-base" style={{fontWeight:700,fontSize:"16px",textAlign:"center"}} />
                            </div>
                        </div>

                        {refundAmount && (<div className="calc-box" style={{marginBottom:"14px"}}><span style={{fontWeight:700,fontSize:"13px",color:"var(--green)"}}>ยอดเงินที่ต้องคืน</span><span style={{fontWeight:800,fontSize:"22px",color:"var(--green)"}}>{refundAmount} บาท</span></div>)}

                        <div style={{display:"flex",gap:"8px"}}><button onClick={onClose} className="btn-ghost" style={{flex:1,justifyContent:"center"}}>ยกเลิก</button><button onClick={handleGenerate} disabled={!refundAmount} className="btn-primary" style={{flex:2,justifyContent:"center",opacity:refundAmount?1:.4,cursor:refundAmount?"pointer":"not-allowed"}}>ดูตัวอย่างใบแปะหน้า</button></div>
                    </div>
                </div>
            );
        };

        /* =================== Marketplace Label Template (หน้าตาใบปะหน้า) =================== */
        const MarketplaceLabelTemplate = ({ data }) => {
            return (
                <div className="w-[105mm] h-[148mm] bg-white text-black box-border relative border-[3px] border-black flex flex-col mx-auto font-sans overflow-hidden" style={{ fontFamily: "'Noto Sans Thai', -apple-system, sans-serif" }}>
                    
                    <div className="p-3 flex-grow flex flex-col">
                        {/* Header Zone */}
                        <div className="flex justify-between items-start border-b-[3px] border-black pb-2 mb-2">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-black text-white flex items-center justify-center font-black text-xl rounded-sm tracking-tighter">LS</div>
                                <div>
                                    <h1 className="font-black text-xl leading-none uppercase tracking-wide">LAMSANG</h1>
                                    <p className="text-[10px] font-black mt-0.5 tracking-widest text-black">STORE OFFICIAL</p>
                                </div>
                            </div>
                            <div className="flex flex-col items-end">
                                <div className="bg-black text-white px-3 py-1 font-black text-lg rounded-sm tracking-widest">
                                    REFUND
                                </div>
                                <p className="text-[9px] font-black mt-1 text-black">ใบแจ้งสินค้าหมด / คืนเงิน</p>
                            </div>
                        </div>

                        {/* Warning Banner */}
                        <div className="bg-white border-[3px] border-black p-2 mb-2 text-center">
                            <h2 className="font-black text-lg tracking-wide text-black">⚠️ สินค้าหมดสต๊อก ⚠️</h2>
                            <p className="text-xs font-bold mt-0.5 text-black">โปรดติดต่อร้านค้าเพื่อรับเงินคืน ตามยอดด้านล่าง</p>
                        </div>

                        {/* Product & SKU QR Zone */}
                        <div className="flex-grow flex flex-col border-[3px] border-black mb-2 bg-white">
                            <div className="bg-black text-white text-[9px] font-black py-1 px-2 uppercase tracking-widest flex justify-between">
                                <span>รายการสินค้า (Item Details)</span>
                                <span>QTY: 0</span>
                            </div>
                            <div className="flex p-2 justify-between items-center h-full">
                                <div className="flex-1 pr-2 flex flex-col justify-center">
                                    <p className="font-black text-base leading-snug text-black">{data.productName}</p>
                                    <p className="text-xs text-black font-bold mt-1">ตัวเลือก: <span className="font-black">{data.variantName || '-'}</span></p>

        /* =================== Label Preview Modal (หน้าจอโชว์ใบแปะหน้า ก่อนพิมพ์) =================== */

        /* =================== Sticker Quantity Modal (หน้าต่างคำนวณจำนวนสติกเกอร์) =================== */
        const StickerQuantityModal = ({ row, onClose, onProceed }) => {
            const productName = String(row[3] || '');
            const sku = String(row[1] || '');
            const [targetQty, setTargetQty] = useState('');

            // คำนวณจำนวนแผ่นอัตโนมัติ (1 แผ่น = 3 ดวง)
            const copies = useMemo(() => {
                const qty = parseInt(targetQty, 10);
                if (isNaN(qty) || qty <= 0) return 0;
                return Math.ceil(qty / 3);
            }, [targetQty]);

            const handleProceed = () => {
                if (copies > 0) {
                    onProceed(copies);

            return (
                <div className="modal-bg" onClick={onClose}><div className="modal-box" onClick={e => e.stopPropagation()}><div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}><div className="modal-icon" style={{background:"rgba(0,113,227,.08)",color:"var(--accent)"}}>🖨️</div><div><h3 style={{fontWeight:800,fontSize:"17px",color:"var(--t1)"}}>คำนวณจำนวนสติกเกอร์</h3><p style={{fontSize:"12px",color:"var(--t3)"}}>1 แผ่น (แถว) พิมพ์ได้ 3 ดวง</p></div></div>

                        <div className="info-box" style={{marginBottom:"14px"}}><p className="modal-label">สินค้าที่ต้องการพิมพ์</p><p style={{fontWeight:700,fontSize:"15px",color:"var(--t1)"}}>{productName}</p><p style={{fontSize:"13px",color:"var(--t2)",marginTop:"4px"}}>SKU: {sku}</p></div>

                        <div style={{marginBottom:"12px"}}><label className="modal-label">ต้องการใช้งานกี่ดวง?</label><input type="number" placeholder="เช่น 100" value={targetQty} onChange={e => setTargetQty(e.target.value)} autoFocus className="input-base" style={{fontWeight:800,fontSize:"24px",textAlign:"center"}} /></div>

                        {copies > 0 && (<div style={{background:"rgba(0,113,227,.06)",border:"1.5px solid rgba(0,113,227,.2)",borderRadius:"14px",padding:"14px 16px",marginBottom:"14px",textAlign:"center"}}><p style={{fontSize:"13px",color:"var(--accent)",fontWeight:600,marginBottom:"4px"}}>{targetQty} ดวง ÷ 3 = {copies} แผ่น</p><p style={{fontSize:"13px",color:"var(--t3)"}}>รวม {copies * 3} ดวง</p></div>)}

                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 p-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-colors">ยกเลิก</button>
                            <button onClick={handleProceed} disabled={copies <= 0}
                                className={`flex-1 p-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 transition-all ${copies > 0 ? 'bg-pink-500 text-white hover:bg-pink-600 active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                ไปหน้าพรีวิว ➡️
                            </button>
                        </div>
                    </div></div>
            );
        };

        /* =================== Sticker Preview Modal (100x25mm 3-up) — Mobile ZPL Support =================== */
        const StickerPreviewModal = ({ data, onClose, printerConfig }) => {
            const { row, copies } = data;
            const productName = String(row[3] || '');
            const sku = String(row[1] || '');
            const variantName = String(row[4] || '');
            const [printStatus, setPrintStatus] = useState('idle'); // idle | sending | success | error | copied
            const [statusMsg, setStatusMsg] = useState('');
            const [showZplText, setShowZplText] = useState(false);
            const [wsState, setWsState] = useState('idle'); // idle | connecting | connected | error

            const { printerIP, printMode, bridgeUrl } = printerConfig;

            // ZPL สำหรับ 100x25mm 3-up layout (800×200 dots @ 203dpi)
            const generateZPL = () => {
                const p = productName.substring(0, 25);
                const v = variantName.substring(0, 25);
                return `^XA^CI28^PW800^LL200^MD20\n^FO10,15^A0N,22,22^FB246,1,0,C^FD${p}^FS\n^FO68,38^BQN,2,5^FDQA,${sku}^FS\n^FO10,165^A0N,20,20^FB246,1,0,C^FD${v}^FS\n^FO276,15^A0N,22,22^FB246,1,0,C^FD${p}^FS\n^FO335,38^BQN,2,5^FDQA,${sku}^FS\n^FO276,165^A0N,20,20^FB246,1,0,C^FD${v}^FS\n^FO542,15^A0N,22,22^FB246,1,0,C^FD${p}^FS\n^FO601,38^BQN,2,5^FDQA,${sku}^FS\n^FO542,165^A0N,20,20^FB246,1,0,C^FD${v}^FS\n^PQ${copies}^XZ`;
            };

            // ─── Mode WS: WebSocket Bridge → TCP → Zebra ───
            const handleWsPrint = () => {
                if (!bridgeUrl) {
                    setStatusMsg('ยังไม่ได้ตั้ง WebSocket URL — กดไอคอน ⚙️ ตั้งค่าก่อน');
                    setPrintStatus('error');
                    return;
                }
                setPrintStatus('sending');
                setStatusMsg('กำลังเชื่อมต่อ Bridge...');
                setWsState('connecting');

                let done = false;
                const url = bridgeUrl.startsWith('ws') ? bridgeUrl : `ws://${bridgeUrl}`;
                let ws;
                try { ws = new WebSocket(url); }
                catch(e) {
                    setStatusMsg(`URL ไม่ถูกต้อง: ${e.message}`);
                    setPrintStatus('error'); setWsState('error'); return;
                }

                const timeout = setTimeout(() => {
                    if (!done) {
                        done = true;
                        setStatusMsg('Timeout — Bridge ไม่ตอบสนองภายใน 8 วินาที');
                        setPrintStatus('error'); setWsState('error');
                        try { ws.close(); } catch {}
                    }
                }, 8000);

                ws.onopen = () => {
                    setWsState('connected');
                    setStatusMsg('เชื่อมต่อ Bridge แล้ว — กำลังส่ง ZPL...');
                    ws.send(JSON.stringify({ action: 'print', zpl: generateZPL(), copies }));
                };

                ws.onmessage = (e) => {
                    clearTimeout(timeout);
                    done = true;
                    let resp;
                    try { resp = JSON.parse(e.data); } catch { resp = {}; }
                    ws.close();
                    if (resp.ok) {
                        setPrintStatus('success');
                        setStatusMsg(`✅ พิมพ์ ${copies} แผ่น → ${resp.printer || bridgeUrl} สำเร็จ!`);
                        setWsState('idle');
                        setTimeout(() => { setPrintStatus('idle'); setStatusMsg(''); }, 4000);
                    } else {
                        setPrintStatus('error');
                        setStatusMsg(`❌ ${resp.error || 'Bridge ตอบกลับ error'}`);
                        setWsState('error');
                    }
                };

                ws.onerror = () => {
                    clearTimeout(timeout);
                    if (!done) {
                        done = true;
                        setPrintStatus('error');
                        setStatusMsg(`❌ เชื่อมต่อ Bridge ไม่ได้ — ตรวจสอบว่า node zpl-bridge.js กำลังรันอยู่`);
                        setWsState('error');
                    }
                };

                ws.onclose = () => { if (!done) { setWsState('idle'); } };
            };

            // ─── Mode 1: WiFi Direct ───
            const handleWifiPrint = async () => {
                setPrintStatus('sending'); setStatusMsg('กำลังส่ง ZPL...');
                try {
                    const ctrl = new AbortController();
                    const timer = setTimeout(() => ctrl.abort(), 5000);
                    await fetch(`http://${printerIP}/pstprnt`, { method:'POST', mode:'no-cors', body:generateZPL(), signal: ctrl.signal });
                    clearTimeout(timer);
                    setPrintStatus('success'); setStatusMsg(`ส่ง ZPL → ${printerIP} แล้ว`);
                    setTimeout(() => { setPrintStatus('idle'); setStatusMsg(''); }, 3000);
                } catch (err) {
                    setPrintStatus('error');
                    setStatusMsg(err.name === 'AbortError' ? 'Timeout — เครื่องพิมพ์ไม่ตอบสนอง' : 'ถูกบล็อก Mixed Content — ลองโหมด WebSocket Bridge แทน');
                }
            };

            // ─── Mode 2: Zebra App ───
            const handleZebraApp = () => {
                const zpl = generateZPL();
                window.location.href = `zpl://${encodeURIComponent(zpl)}`;
                setTimeout(() => {
                    setPrintStatus('copied');
                    setStatusMsg('คัดลอก ZPL ไว้แล้ว (กรณี App ไม่เปิด)');
                    navigator.clipboard.writeText(zpl).catch(() => {});
                }, 1500);
            };

            // ─── Mode 3: Copy ZPL ───
            const handleCopyZPL = async () => {
                const zpl = generateZPL();
                try {
                    await navigator.clipboard.writeText(zpl);
                    setPrintStatus('copied'); setStatusMsg('คัดลอกแล้ว!');
                    setTimeout(() => { setPrintStatus('idle'); setStatusMsg(''); }, 3000);
                } catch { setShowZplText(true); setPrintStatus('copied'); setStatusMsg('กด Select All แล้ว Copy จาก textarea'); }
            };

            const handleBrowserPrint = () => window.print();

            const zplText = generateZPL();
            const zplQrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(zplText.substring(0, 900))}`;
            const isWifiMode = printMode === 'wifi' || (!printMode && printerIP);

            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[400] flex flex-col items-center p-4 overflow-y-auto print:static print:bg-white print:p-0 print:block">
                    <style type="text/css">{`@media print { @page { size: 100mm 25mm; margin: 0; } body { background: white !important; } .print-hide { display: none !important; } * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; } }`}</style>

                    <div className="w-full max-w-lg print-hide mt-4">
                        {/* Top bar */}
                        <div className="flex justify-between items-center mb-5">
                            <button onClick={onClose} className="px-4 py-2.5 bg-slate-700 text-white rounded-xl font-bold text-sm hover:bg-slate-600 transition-colors flex items-center gap-2">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                                กลับ
                            </button>
                            <div className="text-center">
                                <p className="text-white font-black text-base">{productName.substring(0,20)}</p>
                                <p className="text-slate-400 text-xs">{copies} แผ่น × 3 = {copies*3} ดวง</p>
                            </div>
                            <div className="w-20"/>
                        </div>

                        {/* Label Preview */}
                        <div className="flex justify-center mb-5">
                            <div className="bg-white w-[300px] h-[75px] flex box-border rounded-lg overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)]" style={{ fontFamily: "'Noto Sans Thai', sans-serif" }}>
                                {[1, 2, 3].map((num) => (
                                    <div key={num} className="flex-1 flex flex-col items-center justify-between py-1 px-0.5 border-r border-dashed border-gray-300 last:border-r-0 overflow-hidden">
                                        <div className="text-[5.5pt] font-extrabold w-full text-center truncate text-black leading-none">{productName}</div>
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(sku)}`} alt="QR" className="w-10 h-10" style={{ imageRendering: 'pixelated' }} />
                                        <div className="text-[4.5pt] font-bold w-full text-center truncate text-black leading-none">{variantName}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* ─── Print Action Card ─── */}
                        <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-4 mb-4">

                            {/* Status message bar */}
                            {statusMsg && (
                                <div className={`text-sm font-bold px-3 py-2 rounded-xl mb-3 text-center ${printStatus === 'success' ? 'bg-green-900/60 text-green-200' : printStatus === 'error' ? 'bg-red-900/60 text-red-200' : 'bg-blue-900/60 text-blue-200'}`}>
                                    {statusMsg}
                                </div>
                            )}

                            {/* Mode: WebSocket Bridge ⭐ */}
                            {printMode === 'ws' && (
                                <div>
                                    <p className="text-slate-300 text-xs mb-3 text-center">
                                        🌐 WebSocket Bridge → Zebra TCP
                                        {bridgeUrl && <span className="ml-1 text-green-400 font-bold">{bridgeUrl}</span>}
                                    </p>
                                    {!bridgeUrl && (
                                        <div className="bg-yellow-900/50 border border-yellow-500 rounded-xl p-3 mb-3 text-xs text-yellow-200 text-center">
                                            ⚠️ ยังไม่ได้ตั้ง Bridge URL — กดไอคอน <b>⚙️</b> ที่หน้าหลักก่อน
                                        </div>
                                    )}
                                    <button
                                        onClick={handleWsPrint}
                                        disabled={printStatus === 'sending'}
                                        className={`w-full py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 transition-all ${
                                            printStatus === 'success' ? 'bg-green-500 text-white' :
                                            printStatus === 'error'   ? 'bg-red-600 text-white' :
                                            printStatus === 'sending' ? 'bg-slate-500 text-white cursor-not-allowed' :
                                            'bg-pink-500 text-white hover:bg-pink-400 active:scale-95'
                                        }`}>
                                        {printStatus === 'sending' && <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"/>}
                                        {printStatus === 'success' ? '✅ พิมพ์สำเร็จ!' :
                                         printStatus === 'sending' ? `กำลังส่ง...` :
                                         printStatus === 'error'   ? '❌ ลองอีกครั้ง' :
                                         `🖨️ พิมพ์ ZPL ${copies} แผ่น`}
                                    </button>
                                    <p className="text-slate-500 text-[10px] text-center mt-2">
                                        {wsState === 'connecting' ? '🟡 กำลังเชื่อมต่อ...' :
                                         wsState === 'connected'  ? '🟢 เชื่อมต่อแล้ว' :
                                         wsState === 'error'      ? '🔴 เชื่อมต่อไม่ได้' :
                                         '⚪ พร้อมพิมพ์'}
                                    </p>
                                </div>
                            )}

                            {/* Mode: WiFi Direct */}
                            {isWifiMode && (
                                <div>
                                    <p className="text-slate-300 text-xs mb-3 text-center">📡 WiFi Direct → <span className="text-white font-bold">{printerIP}</span></p>
                                    {printStatus === 'error' && (
                                        <div className="bg-red-900/60 border border-red-400 rounded-xl p-3 mb-3 text-sm text-red-200 text-center">
                                            ⚠️ ส่งไม่ได้ — อาจโดน Mixed Content บล็อก<br/>
                                            <span className="text-xs opacity-80">แนะนำเปลี่ยนเป็นโหมด <b>WebSocket Bridge</b></span>
                                        </div>
                                    )}
                                    <button
                                        onClick={handleWifiPrint}
                                        disabled={printStatus === 'sending'}
                                        className={`w-full py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 transition-all ${printStatus === 'success' ? 'bg-green-500 text-white' : printStatus === 'sending' ? 'bg-slate-500 text-white' : 'bg-pink-500 text-white hover:bg-pink-400 active:scale-95'}`}>
                                        {printStatus === 'sending' && <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"/>}
                                        {printStatus === 'success' ? '✅ ส่งพิมพ์แล้ว!' : printStatus === 'sending' ? 'กำลังส่ง...' : `🖨️ พิมพ์ ZPL ${copies} แผ่น`}
                                    </button>
                                </div>
                            )}

                            {/* Mode: Zebra App */}
                            {printMode === 'zebra_app' && (
                                <div>
                                    <p className="text-slate-300 text-xs mb-3 text-center">📱 เปิด Zebra Print App บนมือถือ</p>
                                    <button onClick={handleZebraApp} className="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-2 active:scale-95 transition-all mb-3">
                                        📲 เปิด Zebra App + ส่ง ZPL
                                    </button>
                                    <p className="text-slate-400 text-xs text-center">ต้องติดตั้ง <b className="text-white">Zebra Print Station</b> หรือ <b className="text-white">ZPL Printer</b> บนมือถือก่อน</p>
                                </div>
                            )}

                            {/* Mode: Copy ZPL */}
                            {printMode === 'copy_zpl' && (
                                <div>
                                    <p className="text-slate-300 text-xs mb-3 text-center">📋 คัดลอก ZPL ไปวางในแอปพิมพ์</p>
                                    <button onClick={handleCopyZPL} className={`w-full py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 active:scale-95 transition-all mb-3 ${printStatus === 'copied' ? 'bg-green-500 text-white' : 'bg-violet-600 hover:bg-violet-500 text-white'}`}>
                                        {printStatus === 'copied' ? '✅ คัดลอกแล้ว!' : '📋 Copy ZPL Command'}
                                    </button>
                                    {showZplText && (
                                        <textarea readOnly value={zplText} onFocus={e => e.target.select()} className="w-full text-xs font-mono bg-slate-800 text-green-300 rounded-xl p-3 resize-none border border-slate-600 outline-none" rows={5}/>
                                    )}
                                    <button onClick={() => setShowZplText(v => !v)} className="w-full py-2 text-slate-400 text-xs hover:text-white transition-colors">

                                {showZplText ? '▲ ซ่อน ZPL Command' : '▼ ดู / Copy ZPL Command'}
                            </button>

                        {showZplText && printMode !== 'copy_zpl' && (
                            <div className="mt-2">
                                <textarea readOnly value={zplText} onFocus={e => e.target.select()} className="w-full text-xs font-mono bg-slate-800 text-green-300 rounded-xl p-3 resize-none border border-slate-600 outline-none" rows={5} />
                                <button onClick={() => { navigator.clipboard.writeText(zplText).then(() => setPrintStatus('copied')).catch(() => {}); }} className="mt-1 w-full py-2 bg-slate-700 hover:bg-slate-600 text-white text-xs rounded-xl transition-colors">
                                    {printStatus === 'copied' ? '✅ คัดลอกแล้ว!' : '📋 Copy ZPL'}
                                </button>
                            </div>
                        )}
                    </div>

                    {/* ตัว Label สำหรับ browser print */}
                    <div className="bg-white w-[100mm] h-[25mm] hidden print:flex box-border overflow-hidden text-black font-sans" style={{ fontFamily: "'Noto Sans Thai', -apple-system, sans-serif" }}>
                        {[1, 2, 3].map((num) => (
                            <div key={num} className="flex-1 flex flex-col items-center justify-between p-[1mm] border-r border-dashed border-gray-300 last:border-r-0 h-full box-border overflow-hidden">
                                <div className="text-[7.5pt] font-extrabold w-full text-center whitespace-nowrap overflow-hidden text-ellipsis leading-none pt-[1mm]">{productName}</div>
                                <div className="flex-grow flex items-center justify-center">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(sku)}`} alt="QR" className="h-[15mm] w-[15mm]" style={{ imageRendering: 'pixelated' }} />
                                </div>
                                <div className="text-[6.5pt] font-bold w-full text-center whitespace-nowrap overflow-hidden text-ellipsis leading-none pb-[1mm]">{variantName}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        /* =================== Main App =================== */
        const labelH = "รุ่น";
        const labelI = "สี";
        const labelJ = "ขนาด";

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [stickerPromptRow, setStickerPromptRow] = useState(null);
            const [stickerPreview, setStickerPreview] = useState(null);
            
            const [noticeRow, setNoticeRow] = useState(null);
            const [labelPreview, setLabelPreview] = useState(null);

            const [printerIP, setPrinterIP] = useState(() => localStorage.getItem('ls_printer_ip') || '');
            const [printMode, setPrintMode] = useState(() => localStorage.getItem('ls_print_mode') ?? 'ws');
            const [bridgeUrl, setBridgeUrl] = useState(() => localStorage.getItem('ls_bridge_url') || '');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterH, setFilterH] = useState('');
            const [filterI, setFilterI] = useState('');
            const [filterJ, setFilterJ] = useState('');

            // 🔥 Proxy Config (Apps Script)
            const PROXY_URL = "https://script.google.com/macros/s/AKfycbySdchoxKfxsJ3KtNHJgNxD0weptxTlq0-ZpYzrUACa2FoYsqagtKnsEEe_lHDBWOVR/exec";

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setLoading(true); setError(null);
                try {
                    const res = await fetch(`${PROXY_URL}?path=inventory&t=${new Date().getTime()}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();

                    if (!json || !json.rows) {
                        const h = ["no","sku","CF Code","product_name","variant_name","stock","FALSE","รุ่น","สี","ขนาด"];
                        h[16] = "ยังไม่มีข้อมูล - รอ Sync จาก Sheets";
                        setHeaders(h);
                        setRawData([]);
                        setLoading(false);
                        return;
                    }

                    let rawRowsList = [];
                    if (Array.isArray(json.rows)) {
                        rawRowsList = json.rows;
                    } else {
                        rawRowsList = Object.values(json.rows);
                    }

                    const validRows = rawRowsList.filter(r => r && typeof r === 'object' && (r.barcode || r.item_no));

                    const rows = validRows.map(r => [
                        r.item_no !== undefined ? r.item_no : (r.barcode || ""),   // [0] ลำดับ (Column A)
                        r.sku !== undefined ? r.sku : (r.barcode || ""),           // [1] barcode/sku (Column B)
                        r.cf_code      || "",   // [2] CF Code
                        r.product_name || "",   // [3] product_name
                        r.variant_name || "",   // [4] variant_name
                        r.stock        || "",   // [5] stock
                        r.col_false    || "",   // [6] FALSE
                        r.model        || "",   // [7] รุ่น
                        r.color        || "",   // [8] สี
                        r.size         || ""    // [9] ขนาด
                    ]);

                    const h = ["ลำดับ","Barcode/SKU","CF Code","product_name","variant_name","stock","FALSE","รุ่น","สี","ขนาด"];
                    h[16] = json.meta?.synced_at || "-";
                    setHeaders(h);
                    setRawData(rows);
                    setLoading(false);
                } catch(err) {
                    console.error(err);
                    setError("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err.message);
                    setLoading(false);
                }
            };



            const dropdownOptions = useMemo(() => {
                const h=new Set(), i=new Set(), j=new Set();
                rawData.forEach(r => { 
                    const vH = String(r[7]||'').toLowerCase();
                    const vI = String(r[8]||'').toLowerCase();
                    const vJ = String(r[9]||'').toLowerCase();

                    const matchH = !filterH || vH === filterH.toLowerCase();
                    const matchI = !filterI || vI === filterI.toLowerCase();
                    const matchJ = !filterJ || vJ === filterJ.toLowerCase();

                    // แสดงตัวเลือกเฉพาะที่สอดคล้องกับฟิลเตอร์อื่นๆ ที่เลือกไว้แล้ว
                    if (matchI && matchJ && r[7]) h.add(r[7]);
                    if (matchH && matchJ && r[8]) i.add(r[8]);
                    if (matchH && matchI && r[9]) j.add(r[9]);
                });

                // ลำดับไซส์มาตรฐานที่ร้านค้าใช้
                const sizeOrderArr = ["xs", "s", "m", "l", "xl", "xxl", "2xl", "3xl", "4xl", "5xl", "f", "freesize"];
                const sortSizes = (a, b) => {
                    const aLow = String(a).toLowerCase().trim();
                    const bLow = String(b).toLowerCase().trim();
                    const aIdx = sizeOrderArr.indexOf(aLow);
                    const bIdx = sizeOrderArr.indexOf(bLow);
                    
                    if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
                    if (aIdx !== -1) return -1;
                    if (bIdx !== -1) return 1;
                    return aLow.localeCompare(bLow, 'th');
                };

                return { 
                    h: [...h].sort((a,b) => String(a).localeCompare(String(b), 'th')), 
                    i: [...i].sort((a,b) => String(a).localeCompare(String(b), 'th')), 
                    j: [...j].sort(sortSizes) 
                };
            }, [rawData, filterH, filterI, filterJ]);

            const filteredData = useMemo(() => {
                const filtered = rawData.filter(row => {
                    const vH=String(row[7]||'').toLowerCase(), vI=String(row[8]||'').toLowerCase(), vJ=String(row[9]||'').toLowerCase();
                    const s=searchTerm.toLowerCase();
                    const ok = !searchTerm || [String(row[0]),String(row[1]),String(row[2]),vH,vI,vJ].some(v=>v.includes(s));
                    return ok && (!filterH||vH===filterH.toLowerCase()) && (!filterI||vI===filterI.toLowerCase()) && (!filterJ||vJ===filterJ.toLowerCase());
                });

                // จัดเรียงลำดับใหม่: 1.สี -> 2.ไซส์ -> 3.ลำดับ(น้อยไปมาก)
                const sizeOrderArr = ["xs", "s", "m", "l", "xl", "xxl", "2xl", "3xl", "4xl", "5xl", "f", "freesize"];
                const getSizeWeight = (sizeStr) => {
                    const s = String(sizeStr).toLowerCase().trim();
                    const idx = sizeOrderArr.indexOf(s);
                    return idx !== -1 ? idx : 999;
                };

                return filtered.sort((a, b) => {
                    const colorA = String(a[8] || "");
                    const colorB = String(b[8] || "");
                    const colorCmp = colorA.localeCompare(colorB, 'th');
                    if (colorCmp !== 0) return colorCmp;

                    const sizeA = String(a[9] || "");
                    const sizeB = String(b[9] || "");
                    const weightA = getSizeWeight(sizeA);
                    const weightB = getSizeWeight(sizeB);
                    
                    if (weightA !== weightB) {
                        return weightA - weightB;
                    }
                    if (weightA === 999 && weightB === 999) {
                        const sizeCmp = sizeA.localeCompare(sizeB, 'th');
                        if (sizeCmp !== 0) return sizeCmp;
                    }

                    return String(a[0]).localeCompare(String(b[0]), undefined, { numeric: true });
                });
            }, [rawData, searchTerm, filterH, filterI, filterJ]);

            if (loading) return (
                <div className="flex h-screen items-center justify-center" style={{background:'var(--bg)'}}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'16px'}}>
                        <div className="loader pulse-glow"></div>
                        <p style={{color:'var(--t2)',fontWeight:600,fontSize:'14px'}}>กำลังโหลดข้อมูล...</p>
                    </div>
                </div>
            );

            if (error) return (
                <div className="flex h-screen items-center justify-center p-6 text-center" style={{background:'var(--bg)'}}>
                    <div className="glass-card" style={{padding:'36px',maxWidth:'420px',width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:'12px'}}>

                        <p style={{color:'var(--t2)',fontSize:'13px',lineHeight:1.6}}>{error}</p>
                        <button onClick={() => fetchData()} className="btn-primary" style={{marginTop:'8px'}}>ลองอีกครั้ง</button>
                    </div>
                </div>
            );

            return (
                <div className="app-wrapper">
                    {/* Orbs */}
                    <div className="orb orb-1"></div>
                    <div className="orb orb-2"></div>
                    {/* Nav */}
                    <nav className="store-nav no-print">
                        <div style={{maxWidth:"1200px",margin:"0 auto",padding:"0 16px",height:"52px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                                <div style={{width:"30px",height:"30px",borderRadius:"8px",background:"linear-gradient(135deg,#0071e3,#0a84ff)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                    <svg style={{width:"16px",height:"16px",color:"#fff"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                                </div>
                                <span style={{fontWeight:800,fontSize:"16px",letterSpacing:"-.02em"}}>Print Barcode</span>
                            </div>
                            <span style={{fontSize:"12px",color:"var(--t3)"}}>Lamsang Store</span>
                        </div>
                    </nav>

                    {/* Modal 1: กรอกราคา สำหรับใบแจ้งสินค้าหมด */}
                    {noticeRow && !labelPreview && !stickerPromptRow && !stickerPreview && (
                        <OutOfStockModal 
                            row={noticeRow} 
                            onClose={() => setNoticeRow(null)} 
                            onGenerate={(data) => {
                                setLabelPreview(data);
                                setNoticeRow(null);
                            }}
                        />
                    )}

                    {/* Modal 2: พรีวิวใบปะหน้าก่อนพิมพ์ (เต็มจอ A6) */}
                    {labelPreview && (
                        <LabelPreviewModal 
                            data={labelPreview}
                            onClose={() => setLabelPreview(null)}
                            onBack={() => {
                                const originalRow = rawData.find(r => r[1] === labelPreview.sku);
                                setNoticeRow(originalRow);
                                setLabelPreview(null);
                            }}
                        />
                    )}

                    {/* Modal 2.5: คำนวณจำนวนสติกเกอร์ */}
                    {stickerPromptRow && !stickerPreview && (
                        <StickerQuantityModal
                            row={stickerPromptRow}
                            onClose={() => setStickerPromptRow(null)}
                            onProceed={(copies) => {
                                setStickerPreview({ row: stickerPromptRow, copies });
                                setStickerPromptRow(null);
                            }}
                        />
                    )}

                    {/* Modal 3: พรีวิวสติกเกอร์บาร์โค้ด 100x25mm พร้อมพิมพ์จำนวนแผ่น */}
                    {stickerPreview && (
                        <StickerPreviewModal
                            data={stickerPreview}
                            onClose={() => setStickerPreview(null)}
                            printerConfig={{ printerIP, printMode, bridgeUrl }}
                        />

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div className="settings-bg" onClick={()=>setIsSettingsOpen(false)}>
                            <div className="settings-box" style={{maxWidth:"440px"}} onClick={e=>e.stopPropagation()}>
                                <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px"}}>
                                    <div className="modal-icon" style={{background:"rgba(0,113,227,.08)",color:"var(--accent)"}}>
                                        <svg style={{width:"22px",height:"22px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                                    </div>
                                    <div>
                                        <h3 style={{fontWeight:800,fontSize:"17px",color:"var(--t1)"}}>ตั้งค่าการพิมพ์ ZPL</h3>
                                        <p style={{fontSize:"12px",color:"var(--t3)"}}>เลือกวิธีที่เหมาะกับอุปกรณ์ของคุณ</p>
                                    </div>
                                </div>

                                {/* Print Mode Selector */}
                                <div style={{marginBottom:"16px"}}>
                                    <label className="modal-label" style={{marginBottom:"8px",display:"block"}}>โหมดการพิมพ์</label>
                                    {[
                                        { value: 'ws',        icon: '🌐', label: 'WebSocket Bridge ⭐', desc: 'มือถือ → Node.js Bridge → Zebra TCP (แนะนำ!)' },
                                        { value: 'wifi',      icon: '📡', label: 'WiFi Direct',      desc: 'ส่ง ZPL ตรงไปยัง IP เครื่องพิมพ์ (ใช้ได้บน PC / http://)' },
                                        { value: 'zebra_app', icon: '📲', label: 'Zebra App',         desc: 'เปิด Zebra Print Station บนมือถือ Android/iOS' },
                                        { value: 'copy_zpl',  icon: '📋', label: 'Copy ZPL',          desc: 'คัดลอก ZPL command ไปวางในแอปพิมพ์เอง' },
                                        { value: 'qr_zpl',   icon: '📷', label: 'QR Code ZPL',       desc: 'แสดง QR ของ ZPL ให้สแกนด้วยแอปพิมพ์' },
                                        { value: '',          icon: '🖥️', label: 'Browser Print',      desc: 'พิมพ์ผ่านหน้าต่าง browser (ต้องแก้ Copies เอง)' },
                                    ].map(m => (
                                        <div
                                            key={m.value}
                                            onClick={() => { setPrintMode(m.value); }}
                                            style={{
                                                display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",
                                                borderRadius:"12px",marginBottom:"6px",cursor:"pointer",
                                                border: printMode === m.value ? "2px solid var(--accent)" : "1.5px solid var(--border)",
                                                background: printMode === m.value ? "rgba(0,113,227,.06)" : "#fafafa",
                                                transition:"all .2s"
                                            }}
                                        >
                                            <span style={{fontSize:"20px",flexShrink:0}}>{m.icon}</span>
                                            <div style={{flex:1}}>
                                                <p style={{fontWeight:700,fontSize:"13px",color:"var(--t1)"}}>{m.label}</p>
                                                <p style={{fontSize:"11px",color:"var(--t3)",marginTop:"1px"}}>{m.desc}</p>
                                            </div>
                                            {printMode === m.value && <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"var(--accent)",flexShrink:0}}/>}
                                        </div>
                                    ))}
                                </div>

                                {/* IP Input (แสดงเฉพาะ wifi mode) */}
                                {printMode === 'wifi' && (
                                    <div style={{marginBottom:"14px"}}>
                                        <label className="modal-label">IP เครื่องพิมพ์</label>
                                        <input type="text" inputMode="decimal" className="input-base" placeholder="เช่น 192.168.1.50" value={printerIP} onChange={e=>setPrinterIP(e.target.value)} />
                                        <p style={{fontSize:"11px",color:"var(--t3)",marginTop:"4px"}}>⚠️ บน mobile browser ที่ใช้ https:// อาจถูกบล็อก Mixed Content</p>
                                    </div>
                                )}

                                {/* WebSocket Bridge mode */}
                                {printMode === 'ws' && (
                                    <div style={{marginBottom:"14px"}}>
                                        <label className="modal-label">WebSocket URL ของ Bridge Server</label>
                                        <input type="text" className="input-base" placeholder="ws://192.168.1.100:9200" value={bridgeUrl} onChange={e=>setBridgeUrl(e.target.value)} />
                                        <p style={{fontSize:"11px",color:"var(--t3)",marginTop:"4px"}}>IP ของ PC ที่รัน <b>zpl-bridge.js</b> อยู่</p>
                                        <div style={{background:"rgba(48,209,88,.08)",border:"1px solid rgba(48,209,88,.25)",borderRadius:"10px",padding:"10px 12px",fontSize:"11px",color:"#1a7a3a",lineHeight:1.7,marginTop:"8px"}}>
                                            <b>✅ วิธีรัน Bridge (ทำครั้งเดียวบน PC):</b><br/>
                                            1. ดาวน์โหลด <b>Node.js</b> จาก nodejs.org<br/>
                                            2. แก้ <b>ZPL_HOST</b> ใน <b>zpl-bridge.js</b> ให้เป็น IP เครื่องพิมพ์<br/>
                                            3. รัน: <code style={{background:"#e8f5e9",padding:"1px 5px",borderRadius:"4px"}}>npm install ws</code><br/>
                                            4. รัน: <code style={{background:"#e8f5e9",padding:"1px 5px",borderRadius:"4px"}}>node zpl-bridge.js</code><br/>
                                            5. นำ URL ที่ขึ้นบน terminal มาใส่ช่องด้านบน
                                        </div>
                                    </div>
                                )}

                                {/* Zebra App hint */}
                                {printMode === 'zebra_app' && (
                                    <div style={{background:"rgba(10,132,255,.07)",borderRadius:"12px",padding:"10px 14px",fontSize:"11px",color:"var(--blue)",lineHeight:1.6,marginBottom:"14px"}}>
                                        📥 ต้องติดตั้งบนมือถือก่อน:<br/>
                                        • Android: <b>Zebra Print Station</b> (Play Store)<br/>
                                        • iOS: <b>Zebra Printer</b> (App Store)<br/>
                                        • หรือ <b>ZPL Printer</b> โดย Zebra Technologies
                                    </div>
                                )}

                                {/* Copy / QR hint */}
                                {(printMode === 'copy_zpl' || printMode === 'qr_zpl') && (
                                    <div style={{background:"rgba(191,90,242,.07)",borderRadius:"12px",padding:"10px 14px",fontSize:"11px",color:"var(--purple)",lineHeight:1.6,marginBottom:"14px"}}>
                                        💡 แอปที่รองรับ:<br/>
                                        • <b>Bartender Mobile</b> (Seagull Scientific)<br/>
                                        • <b>ZPL Printer</b>, <b>LabelMark Mobile</b><br/>
                                        • หรือส่ง ZPL text ผ่าน Line → ให้ PC พิมพ์ต่อ
                                    </div>
                                )}

                                <div style={{display:"flex",gap:"8px"}}>
                                    <button onClick={()=>setIsSettingsOpen(false)} className="btn-ghost" style={{flex:1,justifyContent:"center"}}>ยกเลิก</button>
                                    <button onClick={()=>{ localStorage.setItem('ls_print_mode', printMode); localStorage.setItem('ls_printer_ip', printerIP); localStorage.setItem('ls_bridge_url', bridgeUrl); setIsSettingsOpen(false); }} className="btn-primary" style={{flex:1,justifyContent:"center"}}>บันทึก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Application UI - ส่วนนี้จะถูกซ่อนเวลาที่สั่งพิมพ์พรีวิว */}
                    <div className={`${labelPreview || stickerPreview ? "print-hide" : "no-print"}`} style={{maxWidth:"1200px",margin:"0 auto",padding:"16px 16px 60px"}}>
                        {/* Header */}
                        <header className="glass-card anim-up" style={{marginBottom:"20px",padding:"16px 20px"}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"16px",flexWrap:"wrap"}}>
                                <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
                                    <div style={{width:"44px",height:"44px",borderRadius:"12px",background:"linear-gradient(135deg,#0071e3,#0a84ff)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 14px rgba(0,113,227,.3)"}}>
                                        <svg style={{width:"22px",height:"22px",color:"#fff"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
                                    </div>
                                    <div>
                                        <h1 style={{fontWeight:800,fontSize:"18px",color:"var(--t1)",letterSpacing:"-.02em"}}>Print Barcode</h1>
                                        <p style={{fontSize:"12px",color:"var(--t3)",marginTop:"2px"}}>อัปเดต: {headers[16] || '-'}</p>
                                    </div>
                                </div>
                                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                                    <div style={{background:"rgba(0,113,227,.08)",borderRadius:"10px",padding:"8px 14px",display:"flex",flexDirection:"column",alignItems:"center"}}>
                                        <span style={{fontSize:"10px",fontWeight:700,color:"var(--accent)",textTransform:"uppercase",letterSpacing:".06em"}}>พบ</span>
                                        <span style={{fontSize:"20px",fontWeight:800,color:"var(--t1)",lineHeight:1}}>{filteredData.length}</span>
                                    </div>
                                    <button onClick={()=>setIsSettingsOpen(true)} className="btn-icon" title="ตั้งค่า">
                                        <svg style={{width:"18px",height:"18px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    </button>
                                    <button onClick={() => fetchData()} className="btn-icon" title="รีโหลด">
                                        <svg style={{width:"18px",height:"18px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Filters */}
                        <section className="glass-card anim-up" style={{marginBottom:"16px",padding:"16px 20px",position:"relative",zIndex:30,animationDelay:"80ms"}}>
                            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"12px"}}>
                                <div>
                                    <label style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--t3)",marginBottom:"4px",display:"block"}}>ค้นหา</label>
                                    <div style={{position:"relative"}}>
                                        <input type="text" className="input-base" style={{paddingLeft:"36px"}} placeholder="ชื่อ, SKU, รุ่น..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} autocomplete="off" />
                                        <svg style={{position:"absolute",left:"11px",top:"50%",transform:"translateY(-50%)",width:"16px",height:"16px",color:"var(--t3)",pointerEvents:"none"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                    </div>
                                </div>
                                <SearchableSelect id="h-sel" label={labelH} options={dropdownOptions.h} value={filterH} onChange={setFilterH} placeholder={`เลือก ${labelH}`} accentColor="yellow" />
                                <SearchableSelect id="i-sel" label={labelI} options={dropdownOptions.i} value={filterI} onChange={setFilterI} placeholder={`เลือก ${labelI}`} accentColor="pink" />
                                <SearchableSelect id="j-sel" label={labelJ} options={dropdownOptions.j} value={filterJ} onChange={setFilterJ} placeholder={`เลือก ${labelJ}`} accentColor="yellow" />
                            </div>
                        </section>

                        {/* Table */}
                        <div className="glass-card anim-up" style={{overflow:"hidden",animationDelay:"160ms"}}>
                            <div style={{overflowX:"auto"}}>
                                <table className="data-table fit-table">
                                    <thead>
                                        <tr>
                                            <th style={{width:"28%",textAlign:"left"}}>ลำดับ & Barcode</th>
                                            <th style={{width:"36%",textAlign:"center"}}>{labelH}</th>
                                            <th style={{width:"18%",textAlign:"center"}}>{labelI}</th>
                                            <th style={{width:"18%",textAlign:"center"}}>{labelJ}</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredData.map((row, idx) => (
                                            <tr key={idx} className="group">
                                                <td style={{verticalAlign:"top"}}>
                                                    <div className="column-a-container overflow-hidden">
                                                        <span className="column-a-text wrap-text" title={row[3]}>{row[0]||'---'}</span>
                                                        <span style={{fontSize:"11px",color:"var(--t3)",fontWeight:500,marginTop:"2px",display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={row[1]}>{row[1]||'-'}</span>
                                                    </div>
                                                </td>
                                                <td style={{textAlign:"center"}}><span className="badge badge-yellow">{row[7]}</span></td>
                                                <td style={{textAlign:"center"}}><span className="badge badge-pink">{row[8]}</span></td>
                                                <td style={{textAlign:"center",position:"relative",paddingBottom:"36px"}}>
                                                    <span className="badge badge-gray">{row[9]}</span>
                                                    {/* Action Buttons (ย้ายมาไว้ขวาล่างของช่องขนาด) */}
                                                    <div style={{position:"absolute",bottom:"6px",right:"8px",display:"flex",gap:"4px"}}>
                                                        {/* Out-of-stock notice button */}
                                                        <button
                                                            onClick={() => setNoticeRow(row)}
                                                            className="btn-danger"
                                                            title="สร้างใบแจ้งสินค้าหมด">
                                                            <svg style={{width:"15px",height:"15px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                                        </button>
                                                        {/* Sticker preview button -> เรียกหน้าต่างคำนวณจำนวนแผ่น */}
                                                        <button
                                                            onClick={() => setStickerPromptRow(row)}
                                                            className="btn-print"
                                                            title="พรีวิวสติกเกอร์บาร์โค้ด">
                                                            <svg style={{width:"15px",height:"15px"}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <footer style={{marginTop:"24px",padding:"16px",textAlign:"center",fontSize:"11px",color:"var(--t3)",fontWeight:500}}>
                            © 2026 Lamsang Store • Print Barcode System
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
