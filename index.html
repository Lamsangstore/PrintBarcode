<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMSANG Barcode System ✨</title>
    <!-- เพิ่ม Favicon รูป 🍬 เข้ากับธีมของเว็บ -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍬</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(135deg, #fff5f7 0%, #fffbeb 100%);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .column-a-container {
            border-left: 6px solid #f472b6;
            padding-left: 0.75rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }
        
        @media (min-width: 768px) {
            .column-a-container { border-left-width: 10px; padding-left: 1.5rem; }
        }
        
        .column-a-text {
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.3s ease;
            transform-origin: left center;
            will-change: transform;
            line-height: 1.2;
        }

        .group:hover .column-a-text {
            transform: scale(1.6);
            color: #ec4899;
            z-index: 50;
        }

        .fit-table { table-layout: fixed; width: 100%; border-collapse: collapse; }

        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .animate-item {
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .wrap-text { white-space: normal; word-wrap: break-word; word-break: break-word; }

        /* การซ่อน Element ตอนพิมพ์ */
        @media print {
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        /* =================== SearchableSelect =================== */
        const SearchableSelect = ({ id, label, options, value, onChange, placeholder, accentColor = "pink" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handler = (e) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(e.target)) { setIsOpen(false); setSearch(''); }
                };
                document.addEventListener("mousedown", handler);
                return () => document.removeEventListener("mousedown", handler);
            }, []);

            const filtered = useMemo(() => options.filter(o => String(o||'').toLowerCase().includes(search.toLowerCase())), [options, search]);
            const cc = { pink: "ring-pink-300 border-pink-400 text-pink-700 bg-pink-50", yellow: "ring-yellow-300 border-yellow-400 text-yellow-700 bg-yellow-50" };

            return (
                <div className={`flex flex-col relative w-full ${isOpen ? 'z-[100]' : 'z-20'}`} ref={wrapperRef}>
                    <label htmlFor={id} className="text-[10px] md:text-xs font-black text-pink-400 uppercase tracking-widest mb-1 px-2 flex items-center gap-1 no-print">✨ {label}</label>
                    <div id={id} className={`relative w-full p-2 md:p-4 border-2 rounded-[1rem] md:rounded-[1.5rem] cursor-pointer transition-all flex justify-between items-center shadow-sm text-sm md:text-lg no-print ${isOpen ? cc[accentColor]+' shadow-lg scale-[1.02]' : 'bg-white border-yellow-100 hover:border-pink-200'}`} onClick={() => setIsOpen(!isOpen)}>
                        <span className={`truncate mr-1 ${!value ? 'text-slate-300 italic' : 'font-black text-slate-700'}`}>{value || placeholder}</span>
                        <svg className={`w-4 h-4 md:w-5 md:h-5 flex-shrink-0 text-pink-300 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7" /></svg>
                    </div>
                    {isOpen && (
                        <div className="absolute top-[110%] left-0 w-full bg-white border-2 border-pink-100 rounded-[1.2rem] md:rounded-[2rem] shadow-2xl z-[100] overflow-hidden animate-item no-print">
                            <div className="p-2 md:p-3 border-b border-pink-50 bg-pink-50/30">
                                <input autoFocus type="text" className="w-full p-2 text-sm md:text-base border-2 border-pink-100 rounded-xl outline-none focus:border-pink-400" placeholder="ค้นหา..." value={search} onChange={e => setSearch(e.target.value)} onClick={e => e.stopPropagation()} />
                            </div>
                            <div className="max-h-48 md:max-h-64 overflow-y-auto p-1">
                                <div className={`p-2 md:p-3 text-sm md:text-lg rounded-lg mb-1 cursor-pointer transition-colors ${!value ? 'bg-yellow-100 text-yellow-700 font-bold' : 'text-slate-600 hover:bg-pink-50'}`} onClick={() => { onChange(''); setIsOpen(false); setSearch(''); }}>🌈 ทั้งหมด</div>
                                {filtered.length > 0 ? filtered.map((opt, idx) => (
                                    <div key={idx} className={`p-2 md:p-3 text-sm md:text-lg rounded-lg mb-1 cursor-pointer transition-colors ${value === opt ? 'bg-pink-100 text-pink-700 font-bold' : 'text-slate-600 hover:bg-pink-50'}`} onClick={() => { onChange(opt); setIsOpen(false); setSearch(''); }}>🍬 {opt}</div>
                                )) : <div className="p-4 text-center text-slate-400 italic text-xs">ไม่เจอจ้า</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* =================== OutOfStockModal (ฟอร์มกรอกราคาก่อนสร้างใบแปะหน้า) =================== */
        const OutOfStockModal = ({ row, onClose, onGenerate }) => {
            const productName = row[3] || ''; 
            const variantName = row[4] || ''; 
            const sku = row[1] || '';
            const [price, setPrice] = useState('');
            const [discount, setDiscount] = useState('');

            const refundAmount = useMemo(() => {
                const p = parseFloat(price) || 0;
                if (p <= 0) return '';
                
                let d = 0;
                const discStr = String(discount).trim();
                if (discStr.endsWith('%')) {
                    const percent = parseFloat(discStr.replace('%', '')) || 0;
                    d = (p * percent) / 100;
                } else {
                    d = parseFloat(discStr) || 0;
                }
                
                if (d > 0) return Math.max(0, p - d).toFixed(0);
                return p.toFixed(0);
            }, [price, discount]);

            const handleGenerate = () => {
                let discText = discount ? `${discount}` : '0';
                if(discount && !String(discount).includes('%')) discText += ' บาท';

                onGenerate({
                    productName, variantName, sku,
                    originalPrice: price, discountText: discText, refundAmount
                });
            };

            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[300] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-[2rem] shadow-2xl p-6 md:p-8 w-full max-w-lg border-4 border-pink-100 animate-item" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-12 h-12 bg-red-100 rounded-2xl flex items-center justify-center text-2xl">📝</div>
                            <div>
                                <h3 className="text-xl font-black text-red-500">สร้างใบแปะหน้า (คืนเงิน)</h3>
                                <p className="text-xs text-slate-400">กรอกข้อมูลเพื่อสร้างใบปะหน้าสินค้าหมด</p>
                            </div>
                        </div>

                        <div className="bg-pink-50 rounded-2xl p-4 mb-5 border border-pink-100">
                            <p className="text-xs font-bold text-pink-400 uppercase mb-1">สินค้าที่หมดสต๊อก</p>
                            <p className="text-lg font-black text-pink-700 leading-tight">{productName}</p>
                            <p className="text-sm text-pink-500 mt-1">ตัวเลือก: {variantName || '-'}</p>
                        </div>

                        <div className="grid grid-cols-2 gap-3 mb-5">
                            <div>
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">ราคาสินค้า (บาท)</label>
                                <input type="number" placeholder="เช่น 209" value={price} onChange={e => setPrice(e.target.value)}
                                    className="w-full p-3 border-2 border-yellow-100 rounded-xl outline-none focus:border-pink-400 font-bold text-slate-700 text-lg" />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">ส่วนลด (บาท หรือ %)</label>
                                <input type="text" placeholder="เช่น 41 หรือ 10%" value={discount} onChange={e => setDiscount(e.target.value)}
                                    className="w-full p-3 border-2 border-yellow-100 rounded-xl outline-none focus:border-pink-400 font-bold text-slate-700 text-lg" />
                            </div>
                        </div>

                        {refundAmount && (
                            <div className="bg-green-50 border-2 border-green-200 rounded-2xl p-4 mb-6 flex justify-between items-center">
                                <span className="text-sm font-bold text-green-600">ยอดเงินที่ต้องคืน</span>
                                <span className="text-2xl font-black text-green-700">{refundAmount} บาท</span>
                            </div>
                        )}

                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 p-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-colors">ยกเลิก</button>
                            <button onClick={handleGenerate} disabled={!refundAmount}
                                className={`flex-1 p-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 transition-all ${refundAmount ? 'bg-pink-500 text-white hover:bg-pink-600 active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                ดูตัวอย่างใบแปะหน้า
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* =================== Marketplace Label Template (หน้าตาใบปะหน้า) =================== */
        const MarketplaceLabelTemplate = ({ data }) => {
            return (
                <div className="w-[105mm] h-[148mm] bg-white text-black box-border relative border-[3px] border-black flex flex-col mx-auto font-sans overflow-hidden" style={{ fontFamily: "'Sarabun', sans-serif" }}>
                    
                    <div className="p-3 flex-grow flex flex-col">
                        {/* Header Zone */}
                        <div className="flex justify-between items-start border-b-[3px] border-black pb-2 mb-2">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-black text-white flex items-center justify-center font-black text-xl rounded-sm tracking-tighter">LS</div>
                                <div>
                                    <h1 className="font-black text-xl leading-none uppercase tracking-wide">LAMSANG</h1>
                                    <p className="text-[10px] font-black mt-0.5 tracking-widest text-black">STORE OFFICIAL</p>
                                </div>
                            </div>
                            <div className="flex flex-col items-end">
                                <div className="bg-black text-white px-3 py-1 font-black text-lg rounded-sm tracking-widest">
                                    REFUND
                                </div>
                                <p className="text-[9px] font-black mt-1 text-black">ใบแจ้งสินค้าหมด / คืนเงิน</p>
                            </div>
                        </div>

                        {/* Warning Banner */}
                        <div className="bg-white border-[3px] border-black p-2 mb-2 text-center">
                            <h2 className="font-black text-lg tracking-wide text-black">⚠️ สินค้าหมดสต๊อก ⚠️</h2>
                            <p className="text-xs font-bold mt-0.5 text-black">โปรดติดต่อร้านค้าเพื่อรับเงินคืน ตามยอดด้านล่าง</p>
                        </div>

                        {/* Product & SKU QR Zone */}
                        <div className="flex-grow flex flex-col border-[3px] border-black mb-2 bg-white">
                            <div className="bg-black text-white text-[9px] font-black py-1 px-2 uppercase tracking-widest flex justify-between">
                                <span>รายการสินค้า (Item Details)</span>
                                <span>QTY: 0</span>
                            </div>
                            <div className="flex p-2 justify-between items-center h-full">
                                <div className="flex-1 pr-2 flex flex-col justify-center">
                                    <p className="font-black text-base leading-snug text-black">{data.productName}</p>
                                    <p className="text-xs text-black font-bold mt-1">ตัวเลือก: <span className="font-black">{data.variantName || '-'}</span></p>
                                    <p className="text-xs text-black font-bold mt-0.5">SKU: <span className="font-black">{data.sku || '-'}</span></p>
                                </div>
                                {data.sku && (
                                    <div className="flex flex-col items-center justify-center pl-2 border-l-[3px] border-black">
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${encodeURIComponent(data.sku)}`} alt="SKU QR" className="w-12 h-12" />
                                        <span className="text-[8px] font-black mt-1 uppercase tracking-widest text-black">SKU QR</span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Calculation */}
                        <div className="border-[3px] border-black p-2 flex justify-between items-center bg-white mb-1">
                            <div className="text-xs font-black text-black">
                                <p>ราคาสินค้า: {data.originalPrice || 0} บาท</p>
                                <p className="mt-0.5">ส่วนลด: {data.discountText || '0 บาท'}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[9px] font-black mb-0.5 uppercase tracking-wider text-black">ยอดเงินคืนสุทธิ</p>
                                <div className="text-2xl font-black text-black">
                                    ฿ {data.refundAmount}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Footer/Contact - Placed perfectly at the bottom edge */}
                    <div className="border-t-[3px] border-black flex items-stretch mt-auto bg-white h-[36mm]">
                        <div className="w-2/3 p-2 flex flex-col justify-center border-r-[3px] border-black">
                            <p className="font-black text-[12px] mb-1.5 bg-black text-white inline-block px-2 py-0.5 self-start">ขั้นตอนการรับเงินคืน:</p>
                            <ol className="text-[10px] space-y-1.5 list-decimal list-inside font-black text-black leading-tight">
                                <li>แอด Line ID: <span className="text-[11px] bg-white px-1.5 py-0.5 border-2 border-black">@lamsangstore</span></li>
                                <li>ถ่ายรูปใบปะหน้านี้ส่งให้แอดมิน</li>
                                <li>แจ้งเลขที่บัญชีเพื่อรับยอดโอนคืน</li>
                            </ol>
                        </div>
                        <div className="w-1/3 bg-black text-white p-2 flex flex-col items-center justify-center">
                            <div className="bg-white p-1 rounded-sm mb-1">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://line.me/R/ti/p/@lamsangstore`} alt="Line QR" className="w-16 h-16" />
                            </div>
                            <p className="text-[8px] font-black mt-0.5 text-center tracking-widest uppercase">สแกนแอดไลน์</p>
                        </div>
                    </div>
                </div>
            );
        };

        /* =================== Label Preview Modal (หน้าจอโชว์ใบแปะหน้า ก่อนพิมพ์) =================== */
        const LabelPreviewModal = ({ data, onClose, onBack }) => {
            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[400] flex flex-col items-center overflow-y-auto pt-6 pb-20 print:static print:bg-white print:p-0 print:block">
                    {/* แจ้ง CSS ให้พิมพ์เฉพาะหน้านี้แบบ A6 */}
                    <style type="text/css">
                        {`@media print { 
                            @page { size: 105mm 148mm; margin: 0; } 
                            body { background: white !important; }
                            .print-hide { display: none !important; }
                        }`}
                    </style>

                    {/* Toolbar (ซ่อนตอนพิมพ์) */}
                    <div className="w-full max-w-2xl px-4 flex justify-between items-center mb-6 print-hide">
                        <button onClick={onBack} className="px-5 py-2.5 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors flex items-center gap-2">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                            กลับไปแก้ไข
                        </button>
                        <div className="flex gap-3">
                            <button onClick={onClose} className="px-5 py-2.5 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors">
                                ปิด
                            </button>
                            <button onClick={() => window.print()} className="px-8 py-2.5 bg-pink-500 text-white rounded-xl font-black shadow-lg hover:bg-pink-400 transition-colors flex items-center gap-2">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                                สั่งพิมพ์ A6
                            </button>
                        </div>
                    </div>

                    {/* ตัว Label */}
                    <div className="bg-white shadow-[0_0_40px_rgba(0,0,0,0.5)] print:shadow-none print:m-0 border border-gray-200 print:border-none">
                        <MarketplaceLabelTemplate data={data} />
                    </div>
                </div>
            );
        };

        /* =================== Sticker Quantity Modal (หน้าต่างคำนวณจำนวนสติกเกอร์) =================== */
        const StickerQuantityModal = ({ row, onClose, onProceed }) => {
            const productName = String(row[3] || '');
            const sku = String(row[1] || '');
            const [targetQty, setTargetQty] = useState('');

            // คำนวณจำนวนแผ่นอัตโนมัติ (1 แผ่น = 3 ดวง)
            const copies = useMemo(() => {
                const qty = parseInt(targetQty, 10);
                if (isNaN(qty) || qty <= 0) return 0;
                return Math.ceil(qty / 3);
            }, [targetQty]);

            const handleProceed = () => {
                if (copies > 0) {
                    onProceed(copies);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[300] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-[2rem] shadow-2xl p-6 md:p-8 w-full max-w-md border-4 border-pink-100 animate-item" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-12 h-12 bg-pink-100 rounded-2xl flex items-center justify-center text-2xl">🖨️</div>
                            <div>
                                <h3 className="text-xl font-black text-pink-600">คำนวณจำนวนสติกเกอร์</h3>
                                <p className="text-xs text-slate-400">1 แผ่น (แถว) พิมพ์ได้ 3 ดวง</p>
                            </div>
                        </div>

                        <div className="bg-pink-50 rounded-2xl p-4 mb-5 border border-pink-100">
                            <p className="text-xs font-bold text-pink-400 uppercase mb-1">สินค้าที่ต้องการพิมพ์</p>
                            <p className="text-lg font-black text-pink-700 leading-tight">{productName}</p>
                            <p className="text-sm text-pink-500 mt-1">SKU: {sku}</p>
                        </div>

                        <div className="mb-5">
                            <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">ต้องการใช้งานกี่ดวง?</label>
                            <input 
                                type="number" 
                                placeholder="เช่น 100" 
                                value={targetQty} 
                                onChange={e => setTargetQty(e.target.value)} 
                                autoFocus
                                className="w-full p-4 border-2 border-yellow-100 rounded-2xl outline-none focus:border-pink-400 font-black text-slate-700 text-2xl text-center" 
                            />
                        </div>

                        {copies > 0 && (
                            <div className="bg-blue-50 border-2 border-blue-200 rounded-2xl p-4 mb-6 text-center animate-item">
                                <p className="text-sm font-bold text-blue-600 mb-1">{targetQty} ดวง / 3 ดวงต่อแผ่น</p>
                                <p className="text-lg font-black text-blue-800">
                                    ต้องสั่งพิมพ์ <span className="text-4xl text-pink-600 mx-2 leading-none">{copies}</span> แผ่น
                                </p>
                                <p className="text-xs font-bold text-blue-500 mt-2">จะได้สติกเกอร์รวม {copies * 3} ดวง พอดีจ้า!</p>
                            </div>
                        )}

                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 p-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 transition-colors">ยกเลิก</button>
                            <button onClick={handleProceed} disabled={copies <= 0}
                                className={`flex-1 p-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2 transition-all ${copies > 0 ? 'bg-pink-500 text-white hover:bg-pink-600 active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>

                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* =================== Sticker Preview Modal (100x25mm 3-up) =================== */
        const StickerPreviewModal = ({ data, onClose, printerIP }) => {
            const { row, copies } = data;
            const productName = String(row[3] || '');
            const sku = String(row[1] || '');
            const variantName = String(row[4] || '');

            // ZPL ที่ปรับสำหรับขนาด 100x25mm (กว้าง 800 จุด สูง 200 จุด) วาง 3 แถวสมมาตร
            // ขยายขนาด QR Code (^BQN,2,5) และจัดตำแหน่งกึ่งกลางใหม่
            const generateZPL = () => {
                return `^XA^CI28^PW800^LL200^MD20
^FO10,15^A0N,22,22^FB246,1,0,C^FD${productName.substring(0,25)}^FS
^FO68,38^BQN,2,5^FDQA,${sku}^FS
^FO10,165^A0N,20,20^FB246,1,0,C^FD${variantName.substring(0,25)}^FS
^FO276,15^A0N,22,22^FB246,1,0,C^FD${productName.substring(0,25)}^FS
^FO335,38^BQN,2,5^FDQA,${sku}^FS
^FO276,165^A0N,20,20^FB246,1,0,C^FD${variantName.substring(0,25)}^FS
^FO542,15^A0N,22,22^FB246,1,0,C^FD${productName.substring(0,25)}^FS
^FO601,38^BQN,2,5^FDQA,${sku}^FS
^FO542,165^A0N,20,20^FB246,1,0,C^FD${variantName.substring(0,25)}^FS
^PQ${copies}^XZ`;
            };

            const handlePrint = async () => {
                if (printerIP) {
                    try {
                        await fetch(`http://${printerIP}/pstprnt`, { method:'POST', mode:'no-cors', body:generateZPL() });
                        alert(`ส่งคำสั่งพิมพ์ ${copies} แผ่น ไปยัง ${printerIP} เรียบร้อยแล้วจ้า! 🍬`);
                    } catch(err) { window.print(); }
                } else {
                    window.print();
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[400] flex flex-col items-center justify-center p-4 print:static print:bg-white print:p-0 print:block">
                    {/* บังคับขนาดพิมพ์ให้เป็น 100x25 mm */}
                    <style type="text/css">
                        {`@media print { 
                            @page { size: 100mm 25mm; margin: 0; } 
                            body { background: white !important; }
                            .print-hide { display: none !important; }
                        }`}
                    </style>

                    {/* Toolbar */}
                    <div className="w-full max-w-2xl px-4 flex flex-col items-center mb-6 print-hide">
                        {!printerIP && (
                            <div className="bg-yellow-100 border-2 border-yellow-400 text-yellow-900 font-bold px-4 py-2 rounded-xl mb-4 w-full text-center">
                                📌 อย่าลืม! ตอนกดพิมพ์ให้แก้ช่อง <span className="text-red-600 font-black text-lg mx-1">Copies (สำเนา)</span> ให้เป็น <span className="text-red-600 font-black text-xl mx-1">{copies}</span> ด้วยนะคะ
                            </div>
                        )}
                        <div className="w-full flex justify-between items-center">
                            <button onClick={onClose} className="px-5 py-2.5 bg-slate-700 text-white rounded-xl font-bold hover:bg-slate-600 transition-colors flex items-center gap-2">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                                กลับ
                            </button>
                            <button onClick={handlePrint} className="px-8 py-2.5 bg-pink-500 text-white rounded-xl font-black shadow-lg hover:bg-pink-400 transition-colors flex items-center gap-2">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                                {printerIP ? `สั่งพิมพ์ ZPL ${copies} แผ่น` : 'เปิดหน้าต่างสั่งพิมพ์'}
                            </button>
                        </div>
                    </div>

                    {/* ตัว Label พรีวิว */}
                    <div className="bg-white w-[100mm] h-[25mm] flex box-border shadow-[0_0_40px_rgba(0,0,0,0.5)] print:shadow-none print:m-0 overflow-hidden text-black font-sans relative" style={{ fontFamily: "'Sarabun', sans-serif" }}>
                        {[1, 2, 3].map((num) => (
                            <div key={num} className="flex-1 flex flex-col items-center justify-between p-[1mm] border-r border-dashed border-gray-300 last:border-r-0 h-full w-[33.33mm] box-border overflow-hidden">
                                <div className="text-[7.5pt] font-extrabold w-full text-center whitespace-nowrap overflow-hidden text-ellipsis leading-none pt-[1mm]">
                                    {productName}
                                </div>
                                <div className="flex-grow flex items-center justify-center">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(sku)}`} alt="QR" className="h-[16mm] w-[16mm]" style={{ imageRendering: 'pixelated' }} />
                                </div>
                                <div className="text-[6.5pt] font-bold w-full text-center whitespace-nowrap overflow-hidden text-ellipsis leading-none pb-[1mm]">
                                    {variantName}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        /* =================== Main App =================== */
        const labelH = "รุ่น";
        const labelI = "สี";
        const labelJ = "ขนาด";

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            const [stickerPromptRow, setStickerPromptRow] = useState(null); // 1. หน้าจอคำนวณสติกเกอร์
            const [stickerPreview, setStickerPreview] = useState(null);     // 2. พรีวิวสติกเกอร์ 100x25mm {row, copies}
            
            const [noticeRow, setNoticeRow] = useState(null);               // Row สำหรับเปิด Modal กรอกราคา
            const [labelPreview, setLabelPreview] = useState(null);         // Data สำหรับหน้า Preview ใบแปะหน้า A6

            const [printerIP, setPrinterIP] = useState('');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterH, setFilterH] = useState('');
            const [filterI, setFilterI] = useState('');
            const [filterJ, setFilterJ] = useState('');

            // 🔥 Firebase Config
            const FIREBASE_URL = "https://lamsang-barcode-default-rtdb.asia-southeast1.firebasedatabase.app";

            const fetchData = async () => {
                setLoading(true); setError(null);
                try {
                    const res = await fetch(`${FIREBASE_URL}/inventory.json?t=${new Date().getTime()}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();

                    if (!json || !json.rows) {
                        const h = ["no","sku","CF Code","product_name","variant_name","stock","FALSE","รุ่น","สี","ขนาด"];
                        h[16] = "ยังไม่มีข้อมูล - รอ Sync จาก Sheets";
                        setHeaders(h);
                        setRawData([]);
                        setLoading(false);
                        return;
                    }

                    let rawRowsList = [];
                    if (Array.isArray(json.rows)) {
                        rawRowsList = json.rows;
                    } else {
                        rawRowsList = Object.values(json.rows);
                    }

                    const validRows = rawRowsList.filter(r => r && typeof r === 'object' && (r.barcode || r.item_no));

                    const rows = validRows.map(r => [
                        r.item_no !== undefined ? r.item_no : (r.barcode || ""),   // [0] ลำดับ (Column A)
                        r.sku !== undefined ? r.sku : (r.barcode || ""),           // [1] barcode/sku (Column B)
                        r.cf_code      || "",   // [2] CF Code
                        r.product_name || "",   // [3] product_name
                        r.variant_name || "",   // [4] variant_name
                        r.stock        || "",   // [5] stock
                        r.col_false    || "",   // [6] FALSE
                        r.model        || "",   // [7] รุ่น
                        r.color        || "",   // [8] สี
                        r.size         || ""    // [9] ขนาด
                    ]);

                    const h = ["ลำดับ","Barcode/SKU","CF Code","product_name","variant_name","stock","FALSE","รุ่น","สี","ขนาด"];
                    h[16] = json.meta?.synced_at || "-";
                    setHeaders(h);
                    setRawData(rows);
                    setLoading(false);
                } catch(err) {
                    console.error(err);
                    setError("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err.message);
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const dropdownOptions = useMemo(() => {
                const h=new Set(), i=new Set(), j=new Set();
                rawData.forEach(r => { 
                    const vH = String(r[7]||'').toLowerCase();
                    const vI = String(r[8]||'').toLowerCase();
                    const vJ = String(r[9]||'').toLowerCase();

                    const matchH = !filterH || vH === filterH.toLowerCase();
                    const matchI = !filterI || vI === filterI.toLowerCase();
                    const matchJ = !filterJ || vJ === filterJ.toLowerCase();

                    // แสดงตัวเลือกเฉพาะที่สอดคล้องกับฟิลเตอร์อื่นๆ ที่เลือกไว้แล้ว
                    if (matchI && matchJ && r[7]) h.add(r[7]);
                    if (matchH && matchJ && r[8]) i.add(r[8]);
                    if (matchH && matchI && r[9]) j.add(r[9]);
                });

                // ลำดับไซส์มาตรฐานที่ร้านค้าใช้
                const sizeOrderArr = ["xs", "s", "m", "l", "xl", "xxl", "2xl", "3xl", "4xl", "5xl", "f", "freesize"];
                const sortSizes = (a, b) => {
                    const aLow = String(a).toLowerCase().trim();
                    const bLow = String(b).toLowerCase().trim();
                    const aIdx = sizeOrderArr.indexOf(aLow);
                    const bIdx = sizeOrderArr.indexOf(bLow);
                    
                    if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
                    if (aIdx !== -1) return -1;
                    if (bIdx !== -1) return 1;
                    return aLow.localeCompare(bLow, 'th');
                };

                return { 
                    h: [...h].sort((a,b) => String(a).localeCompare(String(b), 'th')), 
                    i: [...i].sort((a,b) => String(a).localeCompare(String(b), 'th')), 
                    j: [...j].sort(sortSizes) 
                };
            }, [rawData, filterH, filterI, filterJ]);

            const filteredData = useMemo(() => {
                const filtered = rawData.filter(row => {
                    const vH=String(row[7]||'').toLowerCase(), vI=String(row[8]||'').toLowerCase(), vJ=String(row[9]||'').toLowerCase();
                    const s=searchTerm.toLowerCase();
                    const ok = !searchTerm || [String(row[0]),String(row[1]),String(row[2]),vH,vI,vJ].some(v=>v.includes(s));
                    return ok && (!filterH||vH===filterH.toLowerCase()) && (!filterI||vI===filterI.toLowerCase()) && (!filterJ||vJ===filterJ.toLowerCase());
                });

                // จัดเรียงลำดับใหม่: 1.สี -> 2.ไซส์ -> 3.ลำดับ(น้อยไปมาก)
                const sizeOrderArr = ["xs", "s", "m", "l", "xl", "xxl", "2xl", "3xl", "4xl", "5xl", "f", "freesize"];
                const getSizeWeight = (sizeStr) => {
                    const s = String(sizeStr).toLowerCase().trim();
                    const idx = sizeOrderArr.indexOf(s);
                    return idx !== -1 ? idx : 999;
                };

                return filtered.sort((a, b) => {
                    const colorA = String(a[8] || "");
                    const colorB = String(b[8] || "");
                    const colorCmp = colorA.localeCompare(colorB, 'th');
                    if (colorCmp !== 0) return colorCmp;

                    const sizeA = String(a[9] || "");
                    const sizeB = String(b[9] || "");
                    const weightA = getSizeWeight(sizeA);
                    const weightB = getSizeWeight(sizeB);
                    
                    if (weightA !== weightB) {
                        return weightA - weightB;
                    }
                    if (weightA === 999 && weightB === 999) {
                        const sizeCmp = sizeA.localeCompare(sizeB, 'th');
                        if (sizeCmp !== 0) return sizeCmp;
                    }

                    return String(a[0]).localeCompare(String(b[0]), undefined, { numeric: true });
                });
            }, [rawData, searchTerm, filterH, filterI, filterJ]);

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-[#fff5f7] p-6 text-center">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl flex flex-col items-center border-4 border-pink-100">
                        <div className="w-16 h-16 border-8 border-yellow-200 border-t-pink-400 rounded-full animate-spin mb-6"></div>
                        <p className="text-pink-500 font-black text-2xl">รวบรวมความสดใส...</p>
                    </div>
                </div>
            );

            if (error) return (
                <div className="flex h-screen items-center justify-center bg-[#fff5f7] p-6 text-center">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl flex flex-col items-center border-4 border-red-200">
                        <div className="text-5xl mb-4">🚧</div>
                        <h2 className="text-red-500 font-black text-2xl mb-2">พบปัญหาการดึงข้อมูล</h2>
                        <p className="text-slate-600 text-sm mb-6 max-w-md">{error}</p>
                        <button onClick={fetchData} className="px-8 py-3 bg-pink-500 text-white rounded-2xl font-bold shadow-lg hover:bg-pink-600 active:scale-95 transition-all">ลองโหลดใหม่จ้า</button>
                    </div>
                </div>
            );

            return (
                <div className="app-wrapper">

                    {/* Modal 1: กรอกราคา สำหรับใบแจ้งสินค้าหมด */}
                    {noticeRow && !labelPreview && !stickerPromptRow && !stickerPreview && (
                        <OutOfStockModal 
                            row={noticeRow} 
                            onClose={() => setNoticeRow(null)} 
                            onGenerate={(data) => {
                                setLabelPreview(data);
                                setNoticeRow(null);
                            }}
                        />
                    )}

                    {/* Modal 2: พรีวิวใบปะหน้าก่อนพิมพ์ (เต็มจอ A6) */}
                    {labelPreview && (
                        <LabelPreviewModal 
                            data={labelPreview}
                            onClose={() => setLabelPreview(null)}
                            onBack={() => {
                                const originalRow = rawData.find(r => r[1] === labelPreview.sku);
                                setNoticeRow(originalRow);
                                setLabelPreview(null);
                            }}
                        />
                    )}

                    {/* Modal 2.5: คำนวณจำนวนสติกเกอร์ */}
                    {stickerPromptRow && !stickerPreview && (
                        <StickerQuantityModal
                            row={stickerPromptRow}
                            onClose={() => setStickerPromptRow(null)}
                            onProceed={(copies) => {
                                setStickerPreview({ row: stickerPromptRow, copies });
                                setStickerPromptRow(null);
                            }}
                        />
                    )}

                    {/* Modal 3: พรีวิวสติกเกอร์บาร์โค้ด 100x25mm พร้อมพิมพ์จำนวนแผ่น */}
                    {stickerPreview && (
                        <StickerPreviewModal
                            data={stickerPreview}
                            onClose={() => setStickerPreview(null)}
                            printerIP={printerIP}
                        />
                    )}

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 bg-pink-900/20 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl p-8 w-full max-w-md border-4 border-pink-100 animate-item">
                                <h3 className="text-2xl font-black text-pink-600 mb-6 flex items-center gap-2">⚙️ ตั้งค่าเครื่องพิมพ์ WiFi</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest px-2">IP ของเครื่องพิมพ์</label>
                                        <input type="text" placeholder="เช่น 192.168.1.50" value={printerIP} onChange={e=>setPrinterIP(e.target.value)} className="w-full p-4 border-2 border-yellow-100 rounded-2xl focus:border-pink-400 outline-none font-bold text-slate-700" />
                                    </div>
                                    <div className="bg-blue-50 p-4 rounded-2xl text-[11px] text-blue-600 font-medium leading-relaxed">
                                        💡 หากระบุ IP ระบบจะส่ง ZPL ตรงไปที่เครื่องพิมพ์ (ตามจำนวน Copy อัตโนมัติ)<br/>
                                        ⚠️ หากเว้นว่างไว้ จะใช้การสั่งพิมพ์ผ่านหน้าต่างคอมพิวเตอร์แทนจ้า
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setIsSettingsOpen(false)} className="flex-1 p-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">ยกเลิก</button>
                                        <button onClick={()=>setIsSettingsOpen(false)} className="flex-1 p-4 bg-pink-500 text-white rounded-2xl font-bold shadow-lg">บันทึกจ้า</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Application UI - ส่วนนี้จะถูกซ่อนเวลาที่สั่งพิมพ์พรีวิว */}
                    <div className={`w-full max-w-7xl mx-auto p-2 md:p-6 lg:p-8 overflow-x-hidden ${labelPreview || stickerPreview ? 'print-hide' : 'no-print'}`}>
                        {/* Header */}
                        <header className="glass-effect p-4 md:p-10 rounded-[1.5rem] md:rounded-[4rem] shadow-xl border-4 border-white mb-4 md:mb-10 relative overflow-hidden">
                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 md:gap-8 relative z-10">
                                <div className="flex items-center gap-3 md:gap-8">
                                    <div className="w-12 h-12 md:w-24 md:h-24 bg-gradient-to-br from-pink-400 to-pink-500 rounded-[1rem] md:rounded-[2.5rem] flex-shrink-0 flex items-center justify-center shadow-xl text-white text-xl md:text-5xl">✨</div>
                                    <div>
                                        <h1 className="text-xl md:text-5xl font-black text-pink-600 tracking-tight leading-tight">ระบบค้นหา Bar code</h1>
                                        <p className="text-yellow-600 font-bold text-[9px] md:text-sm italic">อัปเดต: {headers[16] || '-'}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 md:gap-3 w-full md:w-auto">
                                    <div className="bg-yellow-400 text-yellow-900 px-3 py-1.5 md:px-10 md:py-6 rounded-[0.8rem] md:rounded-[2.5rem] shadow-lg flex flex-col items-center flex-1 md:flex-none border-b-4 border-yellow-500/20">
                                        <span className="text-[8px] md:text-sm uppercase font-black opacity-70">พบข้อมูล</span>
                                        <span className="text-lg md:text-4xl font-black leading-none">{filteredData.length}</span>
                                    </div>
                                    <button onClick={()=>setIsSettingsOpen(true)} className="p-2 md:p-6 bg-white border-2 border-pink-100 rounded-[0.8rem] md:rounded-[2rem] text-pink-400 shadow-md active:scale-90 transition-all">
                                        <svg className="w-5 h-5 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    </button>
                                    <button onClick={fetchData} className="p-2 md:p-6 bg-white border-2 border-pink-100 rounded-[0.8rem] md:rounded-[2rem] text-pink-400 shadow-md active:scale-90 transition-all">
                                        <svg className="w-5 h-5 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Filters */}
                        <section className="bg-white/95 backdrop-blur-md p-3 md:p-10 rounded-[1.5rem] md:rounded-[4rem] shadow-xl border-4 border-pink-50 mb-4 md:mb-10 relative z-30 w-full">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 md:gap-8">
                                <div className="flex flex-col w-full">
                                    <label className="text-[9px] md:text-xs font-black text-pink-400 uppercase tracking-widest mb-1 px-2 flex items-center gap-1">🔍 ค้นหา</label>
                                    <div className="relative">
                                        <input type="text" className="w-full p-2.5 pl-9 md:p-5 md:pl-14 border-2 border-yellow-100 rounded-[1rem] md:rounded-[2rem] focus:border-pink-400 outline-none text-sm md:text-xl font-black text-slate-700" placeholder="พิมพ์ที่นี่จ้า..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                                        <div className="absolute left-3 top-2.5 md:left-5 md:top-5 text-pink-200 md:text-xl">🔍</div>
                                    </div>
                                </div>
                                <SearchableSelect id="h-sel" label={labelH} options={dropdownOptions.h} value={filterH} onChange={setFilterH} placeholder={`เลือก ${labelH}`} accentColor="yellow" />
                                <SearchableSelect id="i-sel" label={labelI} options={dropdownOptions.i} value={filterI} onChange={setFilterI} placeholder={`เลือก ${labelI}`} accentColor="pink" />
                                <SearchableSelect id="j-sel" label={labelJ} options={dropdownOptions.j} value={filterJ} onChange={setFilterJ} placeholder={`เลือก ${labelJ}`} accentColor="yellow" />
                            </div>
                        </section>

                        {/* Table */}
                        <div className="w-full relative z-10 bg-white rounded-[1.5rem] md:rounded-[4rem] shadow-2xl border-2 md:border-4 border-white overflow-hidden">
                            <div className="overflow-x-hidden">
                                <table className="fit-table">
                                    <thead>
                                        <tr className="bg-yellow-300 text-yellow-900 font-black">
                                            <th className="p-2 md:p-8 text-[9px] md:text-xl uppercase tracking-widest text-left w-[25%]">{headers[0]||'A'} & {headers[1]||'B'}</th>
                                            <th className="p-2 md:p-8 text-center w-[39%] uppercase tracking-widest text-[10px] md:text-xl">{labelH}</th>
                                            <th className="p-2 md:p-8 text-center w-[16%] uppercase tracking-widest text-[10px] md:text-xl">{labelI}</th>
                                            <th className="p-2 md:p-8 text-center w-[20%] uppercase tracking-widest text-[10px] md:text-xl">{labelJ}</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredData.map((row, idx) => (
                                            <tr key={idx} className="group border-b border-pink-50 last:border-0 odd:bg-white even:bg-pink-50/10 hover:bg-yellow-50/40 transition-colors duration-200">
                                                <td className="p-2 md:p-8 align-top relative">
                                                    <div className="column-a-container overflow-hidden">
                                                        <span className="column-a-text text-pink-600 text-base md:text-4xl font-black block tracking-tighter wrap-text uppercase" title={row[3]}>{row[0]||'---'}</span>
                                                        <span className="text-[6px] md:text-[10px] text-yellow-600 font-bold mt-0.5 md:mt-1 block truncate opacity-70 group-hover:opacity-100 transition-opacity" title={row[1]}>{row[1]||'-'}</span>
                                                    </div>
                                                </td>
                                                <td className="p-1.5 md:p-8 text-center align-middle"><span className="inline-block px-1.5 py-1 md:px-5 md:py-3 bg-yellow-100 text-yellow-700 rounded-[0.4rem] md:rounded-[1.5rem] text-[9px] md:text-lg font-black w-full shadow-sm wrap-text leading-tight uppercase">📍 {row[7]}</span></td>
                                                <td className="p-1.5 md:p-8 text-center align-middle"><span className="inline-block px-1.5 py-1 md:px-5 md:py-3 bg-pink-100 text-pink-700 rounded-[0.4rem] md:rounded-[1.5rem] text-[9px] md:text-lg font-black w-full shadow-sm wrap-text leading-tight uppercase">🎨 {row[8]}</span></td>
                                                <td className="p-1.5 md:p-8 text-center align-middle relative pb-8 md:pb-12">
                                                    <span className="inline-block px-1.5 py-1 md:px-5 md:py-3 bg-white border border-pink-100 md:border-2 text-pink-400 rounded-[0.4rem] md:rounded-[1.5rem] text-[9px] md:text-lg font-bold w-full shadow-sm italic wrap-text leading-tight uppercase">📏 {row[9]}</span>
                                                    {/* Action Buttons (ย้ายมาไว้ขวาล่างของช่องขนาด) */}
                                                    <div className="absolute bottom-1 right-1 md:bottom-2 md:right-2 flex flex-row gap-1">
                                                        {/* Out-of-stock notice button */}
                                                        <button
                                                            onClick={() => setNoticeRow(row)}
                                                            className="p-1 md:p-2 bg-red-50 text-red-400 rounded-full hover:bg-red-400 hover:text-white transition-all shadow-sm active:scale-90"
                                                            title="สร้างใบแจ้งสินค้าหมด">
                                                            <svg className="w-3 h-3 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                                        </button>
                                                        {/* Sticker preview button -> เรียกหน้าต่างคำนวณจำนวนแผ่น */}
                                                        <button
                                                            onClick={() => setStickerPromptRow(row)}
                                                            className="p-1 md:p-2 bg-pink-50 text-pink-400 rounded-full hover:bg-pink-400 hover:text-white transition-all shadow-sm active:scale-90"
                                                            title="พรีวิวสติกเกอร์บาร์โค้ด">
                                                            <svg className="w-3 h-3 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <footer className="mt-6 md:mt-10 p-4 md:p-6 text-center text-[8px] md:text-[10px] font-black text-yellow-600 uppercase tracking-[0.2em] w-full">
                            🍬 Happy Search • Direct WiFi Print Support • Out-of-Stock Label A6 🍬
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
